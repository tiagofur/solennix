<?xml version="1.0" encoding="UTF-8"?>
<!--
  Solennix — Logo horizontal lockup
  Icon mark (80×80) + wordmark "Solennix"
  Optimized for dark backgrounds; use logo-light.svg for light backgrounds
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 310 80">
  <defs>
    <!-- ── Icon background ── -->
    <linearGradient id="iconBg" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0c0a1a"/>
      <stop offset="100%" stop-color="#1c1525"/>
    </linearGradient>

    <radialGradient id="iconWarm" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#3d1500" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <!-- ── Metallic S gradient (scaled to 80×80 icon area) ── -->
    <linearGradient id="metalIcon" x1="17" y1="10" x2="63" y2="70" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#431407"/>
      <stop offset="12%"  stop-color="#9a3412"/>
      <stop offset="28%"  stop-color="#ea580c"/>
      <stop offset="42%"  stop-color="#ff6b35"/>
      <stop offset="52%"  stop-color="#fbbf24"/>
      <stop offset="60%"  stop-color="#fef3c7"/>
      <stop offset="70%"  stop-color="#fbbf24"/>
      <stop offset="82%"  stop-color="#ff6b35"/>
      <stop offset="92%"  stop-color="#c2410c"/>
      <stop offset="100%" stop-color="#431407"/>
    </linearGradient>

    <!-- ── Wordmark metallic gradient ── -->
    <linearGradient id="metalText" x1="90" y1="0" x2="308" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#c2410c"/>
      <stop offset="20%"  stop-color="#ff6b35"/>
      <stop offset="42%"  stop-color="#fbbf24"/>
      <stop offset="55%"  stop-color="#fef3c7"/>
      <stop offset="70%"  stop-color="#fbbf24"/>
      <stop offset="85%"  stop-color="#ff6b35"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>

    <!-- ── Accent line gradient ── -->
    <linearGradient id="accentLine" x1="90" y1="0" x2="308" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#ff6b35" stop-opacity="0"/>
      <stop offset="20%"  stop-color="#fbbf24" stop-opacity="0.7"/>
      <stop offset="50%"  stop-color="#fef3c7" stop-opacity="0.9"/>
      <stop offset="80%"  stop-color="#fbbf24" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ff6b35" stop-opacity="0"/>
    </linearGradient>

    <!-- ── Glow filter for icon S ── -->
    <filter id="iconGlow" x="-45%" y="-45%" width="190%" height="190%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feFlood flood-color="#ff6b35" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- ── Glow filter for text ── -->
    <filter id="textGlow" x="-5%" y="-20%" width="110%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.5" result="blur"/>
      <feFlood flood-color="#ff6b35" flood-opacity="0.3" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- ── Softer glow for highlight ── -->
    <filter id="hlGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ════════════════════════════════════════════════════════════ -->
  <!-- ICON MARK (80×80)                                           -->
  <!-- ════════════════════════════════════════════════════════════ -->

  <!-- Background rounded square -->
  <rect x="0" y="0" width="80" height="80" rx="16" ry="16" fill="url(#iconBg)"/>
  <rect x="0" y="0" width="80" height="80" rx="16" ry="16" fill="url(#iconWarm)"/>

  <!-- Inner border -->
  <rect x="1.2" y="1.2" width="77.6" height="77.6" rx="14.8" ry="14.8"
        fill="none" stroke="rgba(255,160,80,0.18)" stroke-width="1.2"/>

  <!--
    S path scaled to 80×80 (scale=0.8 from 100×100):
      Original: M 63,33  A 19,19 0 1 0 44,52  C 50,52 50,48 56,48  A 19,19 0 1 1 37,67
      Scaled:   M 50.4,26.4  A 15.2,15.2 0 1 0 35.2,41.6  C 40,41.6 40,38.4 44.8,38.4  A 15.2,15.2 0 1 1 29.6,53.6
  -->

  <!-- Layer 1 – shadow depth -->
  <path d="M 50.4,26.4 A 15.2,15.2 0 1 0 35.2,41.6 C 40,41.6 40,38.4 44.8,38.4 A 15.2,15.2 0 1 1 29.6,53.6"
        fill="none" stroke="#160800" stroke-width="15.5"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.65"/>

  <!-- Layer 2 – metallic gradient -->
  <path d="M 50.4,26.4 A 15.2,15.2 0 1 0 35.2,41.6 C 40,41.6 40,38.4 44.8,38.4 A 15.2,15.2 0 1 1 29.6,53.6"
        fill="none" stroke="url(#metalIcon)" stroke-width="10.5"
        stroke-linecap="round" stroke-linejoin="round"
        filter="url(#iconGlow)"/>

  <!-- Layer 3 – highlight shine -->
  <path d="M 50.4,26.4 A 15.2,15.2 0 1 0 35.2,41.6 C 40,41.6 40,38.4 44.8,38.4 A 15.2,15.2 0 1 1 29.6,53.6"
        fill="none" stroke="#fff8e7" stroke-width="1.8"
        stroke-linecap="round" stroke-linejoin="round"
        opacity="0.5" filter="url(#hlGlow)"/>

  <!-- Sparkle ✦ top-right of icon -->
  <g transform="translate(64, 13)" opacity="0.85">
    <line x1="0" y1="-4.5" x2="0"  y2="4.5" stroke="#fde68a" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="-4.5" y1="0" x2="4.5" y2="0"  stroke="#fde68a" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="-3" y1="-3"  x2="3"  y2="3"   stroke="#fde68a" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="3"  y1="-3"  x2="-3" y2="3"   stroke="#fde68a" stroke-width="0.8" stroke-linecap="round"/>
  </g>

  <!-- Accent dot bottom-left of icon -->
  <circle cx="14" cy="66" r="2.8" fill="none" stroke="#ff6b35" stroke-width="1" opacity="0.45"/>
  <circle cx="14" cy="66" r="1"   fill="#fbbf24" opacity="0.6"/>

  <!-- ════════════════════════════════════════════════════════════ -->
  <!-- WORDMARK: "Solennix"                                        -->
  <!-- ════════════════════════════════════════════════════════════ -->

  <!-- Wordmark text -->
  <text
    x="96" y="51"
    font-family="Georgia, 'Palatino Linotype', Palatino, 'Book Antiqua', serif"
    font-size="34"
    font-weight="bold"
    letter-spacing="1.5"
    fill="url(#metalText)"
    filter="url(#textGlow)">Solennix</text>

  <!-- Decorative accent line below wordmark -->
  <line x1="96" y1="60" x2="308" y2="60"
        stroke="url(#accentLine)" stroke-width="1" stroke-linecap="round"/>
</svg>
