version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: solennix-db
    restart: always
    environment:
      POSTGRES_USER: solennix_user
      POSTGRES_PASSWORD: solennix_password
      POSTGRES_DB: solennix
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
