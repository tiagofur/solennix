openapi: 3.0.3
info:
  title: Solennix API
  version: 1.0.0
  description: Event management platform for Latin American organizers
servers:
  - url: http://localhost:8000
    description: Local dev
  - url: https://api.solennix.com
    description: Production
security:
  - bearerAuth: []
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    User:
      type: object
      required:
        - id
        - email
        - name
        - plan
        - role
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
        business_name:
          type: string
          nullable: true
        logo_url:
          type: string
          nullable: true
        brand_color:
          type: string
          nullable: true
        show_business_name_in_pdf:
          type: boolean
          nullable: true
        default_deposit_percent:
          type: number
          format: double
          nullable: true
        default_cancellation_days:
          type: number
          format: double
          nullable: true
        default_refund_percent:
          type: number
          format: double
          nullable: true
        contract_template:
          type: string
          nullable: true
        email_payment_receipt:
          type: boolean
          nullable: true
        email_event_reminder:
          type: boolean
          nullable: true
        email_subscription_updates:
          type: boolean
          nullable: true
        email_weekly_summary:
          type: boolean
          nullable: true
        email_marketing:
          type: boolean
          nullable: true
        push_enabled:
          type: boolean
          nullable: true
        push_event_reminder:
          type: boolean
          nullable: true
        push_payment_received:
          type: boolean
          nullable: true
        plan:
          type: string
          enum: [basic, pro, business, premium]
          description: Current plan. 'premium' is a legacy value retained for backward compat.
        role:
          type: string
          enum: [user, admin]
        stripe_customer_id:
          type: string
          nullable: true
        google_user_id:
          type: string
          nullable: true
        apple_user_id:
          type: string
          nullable: true
        plan_expires_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    TokenPair:
      type: object
      required:
        - access_token
        - refresh_token
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
    AuthSuccessResponse:
      type: object
      required:
        - user
        - tokens
      properties:
        user:
          $ref: "#/components/schemas/User"
        tokens:
          $ref: "#/components/schemas/TokenPair"
    RegisterRequest:
      type: object
      required:
        - email
        - password
        - name
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
          maxLength: 128
        name:
          type: string
          minLength: 1
          maxLength: 255
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    RefreshTokenRequest:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string
    ForgotPasswordRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
    ResetPasswordRequest:
      type: object
      required:
        - token
        - password
      properties:
        token:
          type: string
        password:
          type: string
          minLength: 8
          maxLength: 128
    ChangePasswordRequest:
      type: object
      required:
        - current_password
        - new_password
      properties:
        current_password:
          type: string
    GoogleSignInRequest:
      type: object
      required:
        - id_token
      properties:
        id_token:
          type: string
        full_name:
          type: string
          nullable: true
    AppleSignInRequest:
      type: object
      required:
        - identity_token
      properties:
        identity_token:
          type: string
        authorization_code:
          type: string
        full_name:
          type: string
          nullable: true
        email:
          type: string
          format: email
          nullable: true
    AppleAuthSuccessResponse:
      type: object
      required:
        - user
        - tokens
        - email_is_private_relay
      properties:
        user:
          $ref: "#/components/schemas/User"
        tokens:
          $ref: "#/components/schemas/TokenPair"
        email_is_private_relay:
          type: boolean
    UpdateProfileRequest:
      type: object
      properties:
        name:
          type: string
          nullable: true
        business_name:
          type: string
          nullable: true
        logo_url:
          type: string
          nullable: true
        brand_color:
          type: string
          nullable: true
        show_business_name_in_pdf:
          type: boolean
          nullable: true
        default_deposit_percent:
          type: number
          format: double
          nullable: true
        default_cancellation_days:
          type: number
          format: double
          nullable: true
        default_refund_percent:
          type: number
          format: double
          nullable: true
        contract_template:
          type: string
          nullable: true
        email_payment_receipt:
          type: boolean
          nullable: true
        email_event_reminder:
          type: boolean
          nullable: true
        email_subscription_updates:
          type: boolean
          nullable: true
        email_weekly_summary:
          type: boolean
          nullable: true
        email_marketing:
          type: boolean
          nullable: true
        push_enabled:
          type: boolean
          nullable: true
        push_event_reminder:
          type: boolean
          nullable: true
        push_payment_received:
          type: boolean
          nullable: true
        new_password:
          type: string
          minLength: 8
          maxLength: 128
    MessageResponse:
      type: object
      properties:
        message:
          type: string
    CheckoutSessionResponse:
      type: object
      required:
        - url
      properties:
        url:
          type: string
          format: uri
    SubscriptionInfo:
      type: object
      required:
        - status
        - provider
        - source_badge
        - cancel_instructions
        - cancel_at_period_end
      properties:
        status:
          type: string
          enum: [active, past_due, canceled, trialing]
        provider:
          type: string
          enum: [stripe, apple, google]
        source_badge:
          type: string
          description: Server-authored short label in Spanish identifying the subscription source (e.g. "Suscrito vía App Store"). Clients render this verbatim.
        cancel_instructions:
          type: string
          description: Server-authored localized instructions explaining where the user must go to cancel, based on the origin provider. Single source of truth so iOS/Android/Web stay in sync.
        current_period_end:
          type: string
          format: date-time
          nullable: true
        cancel_at_period_end:
          type: boolean
        amount_cents:
          type: integer
          nullable: true
          description: Renewal amount in minor units (e.g. cents). Populated only when provider is stripe; mobile stores (apple/google) expose price at purchase time.
        currency:
          type: string
          nullable: true
          description: ISO 4217 lowercase (e.g. "usd", "mxn"). Populated only for stripe provider.
        billing_interval:
          type: string
          nullable: true
          description: Stripe recurring interval — "month" or "year". Null for apple/google.
    SubscriptionStatusResponse:
      type: object
      required:
        - plan
        - has_stripe_account
      properties:
        plan:
          type: string
          enum: [basic, pro, business, premium]
          description: Current plan. 'premium' is a legacy value retained for backward compat.
        has_stripe_account:
          type: boolean
        subscription:
          type: object
          allOf:
            - $ref: "#/components/schemas/SubscriptionInfo"
          nullable: true
    Event:
      type: object
      required:
        - id
        - user_id
        - client_id
        - event_date
        - service_type
        - num_people
        - status
        - discount
        - discount_type
        - requires_invoice
        - tax_rate
        - tax_amount
        - total_amount
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        client_id:
          type: string
          format: uuid
        event_date:
          type: string
          description: DATE string in YYYY-MM-DD format
        start_time:
          type: string
          nullable: true
        end_time:
          type: string
          nullable: true
        service_type:
          type: string
        num_people:
          type: integer
        status:
          type: string
          enum: [quoted, confirmed, completed, cancelled]
        discount:
          type: number
          format: double
        discount_type:
          type: string
          enum: [percent, fixed]
        requires_invoice:
          type: boolean
        tax_rate:
          type: number
          format: double
        tax_amount:
          type: number
          format: double
        total_amount:
          type: number
          format: double
        location:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        deposit_percent:
          type: number
          format: double
          nullable: true
        cancellation_days:
          type: number
          format: double
          nullable: true
        refund_percent:
          type: number
          format: double
          nullable: true
        notes:
          type: string
          nullable: true
        photos:
          type: string
          nullable: true
        client:
          $ref: "#/components/schemas/Client"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    EventUpsertRequest:
      type: object
      required:
        - client_id
        - event_date
        - service_type
        - num_people
        - status
        - discount
        - discount_type
        - requires_invoice
        - tax_rate
        - tax_amount
        - total_amount
      properties:
        client_id:
          type: string
          format: uuid
        event_date:
          type: string
          description: DATE string in YYYY-MM-DD or ISO-like value; backend validates date portion
        start_time:
          type: string
          nullable: true
        end_time:
          type: string
          nullable: true
        service_type:
          type: string
        num_people:
          type: integer
        status:
          type: string
          enum: [quoted, confirmed, completed, cancelled]
        discount:
          type: number
          format: double
        discount_type:
          type: string
          enum: [percent, fixed]
        requires_invoice:
          type: boolean
        tax_rate:
          type: number
          format: double
        tax_amount:
          type: number
          format: double
        total_amount:
          type: number
          format: double
        location:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        deposit_percent:
          type: number
          format: double
          nullable: true
        cancellation_days:
          type: number
          format: double
          nullable: true
        refund_percent:
          type: number
          format: double
          nullable: true
        notes:
          type: string
          nullable: true
    Client:
      type: object
      required:
        - id
        - user_id
        - name
        - phone
        - total_events
        - total_spent
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        name:
          type: string
        phone:
          type: string
        email:
          type: string
          format: email
          nullable: true
        address:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        photo_url:
          type: string
          nullable: true
        total_events:
          type: integer
        total_spent:
          type: number
          format: double
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Product:
      type: object
      required:
        - id
        - user_id
        - name
        - category
        - base_price
        - is_active
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        name:
          type: string
        category:
          type: string
        base_price:
          type: number
          format: double
        recipe:
          type: string
          nullable: true
        image_url:
          type: string
          nullable: true
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    InventoryItem:
      type: object
      required:
        - id
        - user_id
        - ingredient_name
        - current_stock
        - minimum_stock
        - unit
        - type
        - last_updated
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        ingredient_name:
          type: string
        current_stock:
          type: number
          format: double
        minimum_stock:
          type: number
          format: double
        unit:
          type: string
        unit_cost:
          type: number
          format: double
          nullable: true
        type:
          type: string
          enum: [ingredient, equipment, supply]
          description: Category of the inventory item. 'ingredient' scales with product recipes, 'equipment' is reusable, 'supply' is consumed per event.
        last_updated:
          type: string
          format: date-time
    ProductIngredient:
      type: object
      required:
        - id
        - product_id
        - inventory_id
        - quantity_required
        - bring_to_event
        - created_at
      properties:
        id:
          type: string
          format: uuid
        product_id:
          type: string
          format: uuid
        inventory_id:
          type: string
          format: uuid
        quantity_required:
          type: number
          format: double
        capacity:
          type: number
          format: double
          nullable: true
        bring_to_event:
          type: boolean
        created_at:
          type: string
          format: date-time
        ingredient_name:
          type: string
          nullable: true
        unit:
          type: string
          nullable: true
        unit_cost:
          type: number
          format: double
          nullable: true
        type:
          type: string
          enum: [ingredient, equipment, supply]
          nullable: true
    ProductIngredientsUpdateRequest:
      type: object
      required:
        - ingredients
      properties:
        ingredients:
          type: array
          items:
            $ref: "#/components/schemas/ProductIngredient"
    ProductIngredientsBatchRequest:
      type: object
      required:
        - product_ids
      properties:
        product_ids:
          type: array
          items:
            type: string
            format: uuid
    EventProduct:
      type: object
      required:
        - id
        - event_id
        - product_id
        - quantity
        - unit_price
        - discount
        - total_price
        - created_at
      properties:
        id:
          type: string
          format: uuid
        event_id:
          type: string
          format: uuid
        product_id:
          type: string
          format: uuid
        quantity:
          type: number
          format: double
        unit_price:
          type: number
          format: double
        discount:
          type: number
          format: double
        total_price:
          type: number
          format: double
        created_at:
          type: string
          format: date-time
        product_name:
          type: string
          nullable: true
    EventExtra:
      type: object
      required:
        - id
        - event_id
        - description
        - cost
        - price
        - exclude_utility
        - include_in_checklist
        - created_at
      properties:
        id:
          type: string
          format: uuid
        event_id:
          type: string
          format: uuid
        description:
          type: string
        cost:
          type: number
          format: double
        price:
          type: number
          format: double
        exclude_utility:
          type: boolean
        include_in_checklist:
          type: boolean
        created_at:
          type: string
          format: date-time
    EventEquipment:
      type: object
      required:
        - id
        - event_id
        - inventory_id
        - quantity
        - created_at
      properties:
        id:
          type: string
          format: uuid
        event_id:
          type: string
          format: uuid
        inventory_id:
          type: string
          format: uuid
        quantity:
          type: integer
        notes:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        equipment_name:
          type: string
          nullable: true
        unit:
          type: string
          nullable: true
        current_stock:
          type: number
          format: double
          nullable: true
    EquipmentConflict:
      type: object
      required:
        - inventory_id
        - equipment_name
        - conflicting_event_id
        - event_date
        - service_type
        - conflict_type
      properties:
        inventory_id:
          type: string
          format: uuid
        equipment_name:
          type: string
        conflicting_event_id:
          type: string
          format: uuid
        event_date:
          type: string
        start_time:
          type: string
          nullable: true
        end_time:
          type: string
          nullable: true
        service_type:
          type: string
        client_name:
          type: string
          nullable: true
        conflict_type:
          type: string
          enum: [overlap, insufficient_gap, full_day]
    EquipmentConflictRequest:
      type: object
      required:
        - event_date
        - inventory_ids
      properties:
        event_date:
          type: string
        start_time:
          type: string
          nullable: true
        end_time:
          type: string
          nullable: true
        inventory_ids:
          type: array
          items:
            type: string
            format: uuid
        exclude_event_id:
          type: string
          format: uuid
          nullable: true
    ProductQuantityRequest:
      type: object
      required:
        - product_id
        - quantity
      properties:
        product_id:
          type: string
          format: uuid
        quantity:
          type: number
          format: double
    ProductQuantityRequestEnvelope:
      type: object
      required:
        - products
      properties:
        products:
          type: array
          items:
            $ref: "#/components/schemas/ProductQuantityRequest"
    EquipmentSuggestion:
      type: object
      required:
        - id
        - ingredient_name
        - current_stock
        - unit
        - type
        - suggested_quantity
      properties:
        id:
          type: string
          format: uuid
        ingredient_name:
          type: string
        current_stock:
          type: number
          format: double
        unit:
          type: string
        type:
          type: string
        suggested_quantity:
          type: integer
    EventSupply:
      type: object
      required:
        - id
        - event_id
        - inventory_id
        - quantity
        - unit_cost
        - source
        - exclude_cost
        - created_at
      properties:
        id:
          type: string
          format: uuid
        event_id:
          type: string
          format: uuid
        inventory_id:
          type: string
          format: uuid
        quantity:
          type: number
          format: double
        unit_cost:
          type: number
          format: double
        source:
          type: string
          enum: [stock, purchase]
        exclude_cost:
          type: boolean
        created_at:
          type: string
          format: date-time
        supply_name:
          type: string
          nullable: true
        unit:
          type: string
          nullable: true
        current_stock:
          type: number
          format: double
          nullable: true
    SupplySuggestion:
      type: object
      required:
        - id
        - ingredient_name
        - current_stock
        - unit
        - unit_cost
        - suggested_quantity
      properties:
        id:
          type: string
          format: uuid
        ingredient_name:
          type: string
        current_stock:
          type: number
          format: double
        unit:
          type: string
        unit_cost:
          type: number
          format: double
        suggested_quantity:
          type: number
          format: double
    EventItemsUpdateRequest:
      type: object
      required:
        - products
        - extras
      properties:
        products:
          type: array
          items:
            $ref: "#/components/schemas/EventProduct"
        extras:
          type: array
          items:
            $ref: "#/components/schemas/EventExtra"
        equipment:
          type: array
          items:
            $ref: "#/components/schemas/EventEquipment"
        supplies:
          type: array
          items:
            $ref: "#/components/schemas/EventSupply"
    Payment:
      type: object
      required:
        - id
        - event_id
        - user_id
        - amount
        - payment_date
        - payment_method
        - created_at
      properties:
        id:
          type: string
          format: uuid
        event_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        amount:
          type: number
          format: double
        payment_date:
          type: string
          description: DATE string
        payment_method:
          type: string
        notes:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
    EventCheckoutSession:
      type: object
      required:
        - session_id
        - url
      properties:
        session_id:
          type: string
        url:
          type: string
          format: uri
    EventPaymentSession:
      type: object
      required:
        - session_id
        - payment_status
        - amount_total
        - customer_email
      properties:
        session_id:
          type: string
        payment_status:
          type: string
        amount_total:
          type: number
          format: double
        customer_email:
          type: string
    PaginatedClientsResponse:
      type: object
      required:
        - data
        - total
        - page
        - limit
        - total_pages
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Client"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        total_pages:
          type: integer
    PaginatedEventsResponse:
      type: object
      required:
        - data
        - total
        - page
        - limit
        - total_pages
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Event"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        total_pages:
          type: integer
    PaginatedProductsResponse:
      type: object
      required:
        - data
        - total
        - page
        - limit
        - total_pages
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        total_pages:
          type: integer
    PaginatedInventoryResponse:
      type: object
      required:
        - data
        - total
        - page
        - limit
        - total_pages
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/InventoryItem"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        total_pages:
          type: integer
    PaginatedPaymentsResponse:
      type: object
      required:
        - data
        - total
        - page
        - limit
        - total_pages
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Payment"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        total_pages:
          type: integer
    AuditLog:
      type: object
      required:
        - id
        - user_id
        - action
        - resource_type
        - created_at
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        action:
          type: string
