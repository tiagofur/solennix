      description: At least one filter must be provided (q, status, from, to or client_id). Returns a flat array of events matching every provided filter.
      parameters:
        - name: q
          in: query
          description: Free-text query matched against title, description and notes
          schema:
            type: string
        - name: status
          in: query
          description: Filter by event status
          schema:
            type: string
            enum: [quoted, confirmed, completed, cancelled]
        - name: from
          in: query
          description: Inclusive start date (YYYY-MM-DD)
          schema:
            type: string
            format: date
        - name: to
          in: query
          description: Inclusive end date (YYYY-MM-DD)
          schema:
            type: string
            format: date
        - name: client_id
          in: query
          description: Restrict results to one client
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Matching events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"
        "400":
          description: Invalid filters or missing mandatory filter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
