                $ref: "#/components/schemas/EventFormLink"
        "400":
          description: Validation error (e.g. ttl_days out of range or label too long)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
        "402":
          description: Plan limit reached (basic plan allows max 3 active links)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Failed to create link
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/event-forms/{id}:
    delete:
      operationId: deleteEventFormLink
      summary: Revoke (delete) a shareable event form link
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Link revoked
        "400":
          description: Invalid link ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
        "404":
          description: Link not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Failed to delete link
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/events/{id}/public-link:
    get:
      operationId: getEventPublicLink
      summary: Get the currently active client-portal link for an event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Active public link
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventPublicLink"
        "400":
          description: Invalid event ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
        "404":
          description: No active public link for this event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Failed to get public link
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createOrRotateEventPublicLink
      summary: Create or rotate the client-portal link for an event
      description: |
        Creates a new active public link, revoking any previously active one.
        Repeated calls rotate the token, invalidating any URL already shared.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventPublicLinkCreateRequest"
      responses:
        "201":
          description: Public link created or rotated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventPublicLink"
        "400":
          description: Invalid event ID or ttl_days out of range
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
        "404":
          description: Event not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Failed to create public link
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: revokeEventPublicLink
      summary: Revoke the active client-portal link for an event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Public link revoked
        "400":
          description: Invalid event ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
        "404":
          description: No active public link to revoke
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Failed to revoke public link
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/public/event-forms/{token}:
    get:
      security: []
      operationId: getEventFormData
      summary: Get organizer branding and product catalog for a shareable event form
      description: |
        Public endpoint (no auth). Rate-limited to 10 requests/minute.
        Returns organizer branding and active products (without prices) for the form.
        Responds 410 Gone when the link has been used or expired.
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Form data including organizer branding and product catalog
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventFormDataResponse"
        "400":
          description: Token is required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Link not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "410":
          description: Link has been used or has expired
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: link_invalid
                  message:
                    type: string
        "500":
          description: Failed to load form data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      security: []
      operationId: submitEventForm
      summary: Submit a public event form
      description: |
        Public endpoint (no auth). Rate-limited to 10 requests/minute.
        Creates a Client + Event + EventProducts in a single transaction, then marks
        the link as used. Links can only be submitted once.
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventFormSubmission"
      responses:
        "201":
          description: Form submitted successfully — draft event and client created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventFormSubmitResponse"
        "400":
          description: Validation error or invalid product ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Link not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Link has already been used
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: link_already_used
                  message:
                    type: string
        "410":
          description: Link has expired or is no longer valid
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: link_invalid
                  message:
                    type: string
        "500":
          description: Failed to process form submission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/public/events/{token}:
    get:
      security: []
      operationId: getEventPortalData
      summary: Get read-only client portal data for a shared event link
      description: |
        Public endpoint (no auth). Rate-limited to 10 requests/minute.
        The token is the proof of access — no authentication required.
        Responds 404 for unknown tokens and 410 Gone for revoked or expired links.
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Client portal data with event details, organizer branding, and payment summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicEventView"
        "400":
          description: Token is required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Link not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "410":
          description: Link has been revoked, expired, or the associated event was deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Failed to load portal data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
