<?xml version="1.0" encoding="UTF-8"?>
<!-- Opcion 18: Copa de vino/coctel elegante y minimal -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg18" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B2A4A"/>
      <stop offset="100%" stop-color="#0F1A2E"/>
    </linearGradient>
    <linearGradient id="g18" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4B87A"/>
      <stop offset="100%" stop-color="#C4A265"/>
    </linearGradient>
    <linearGradient id="wine18" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C4A265" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#C4A265" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="40" fill="url(#bg18)"/>
  <!-- Copa - bowl -->
  <path d="M65,48 L65,95 Q65,120 100,125 Q135,120 135,95 L135,48"
        fill="url(#wine18)" stroke="url(#g18)" stroke-width="3" stroke-linecap="round"/>
  <!-- Linea de liquido -->
  <path d="M70,75 Q100,82 130,75" fill="none" stroke="#C4A265" stroke-width="1" opacity="0.4"/>
  <!-- Tallo -->
  <line x1="100" y1="125" x2="100" y2="155" stroke="url(#g18)" stroke-width="3"/>
  <!-- Base -->
  <ellipse cx="100" cy="158" rx="22" ry="5" fill="none" stroke="url(#g18)" stroke-width="3"/>
  <!-- Reflejo en la copa -->
  <path d="M75,55 L75,85" stroke="#F5F0E8" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  <!-- Destello superior -->
  <circle cx="130" cy="50" r="2" fill="#F5F0E8" opacity="0.5"/>
</svg>
