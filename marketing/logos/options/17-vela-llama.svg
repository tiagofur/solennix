<?xml version="1.0" encoding="UTF-8"?>
<!-- Opcion 17: Vela con llama elegante -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg17" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B2A4A"/>
      <stop offset="100%" stop-color="#0F1A2E"/>
    </linearGradient>
    <linearGradient id="flame17" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#C4A265"/>
      <stop offset="60%" stop-color="#D4B87A"/>
      <stop offset="100%" stop-color="#F5F0E8"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="40" fill="url(#bg17)"/>
  <!-- Cuerpo de vela -->
  <rect x="85" y="95" width="30" height="65" rx="3" fill="none" stroke="#F5F0E8" stroke-width="3"/>
  <!-- Mecha -->
  <line x1="100" y1="95" x2="100" y2="78" stroke="#6B7B8D" stroke-width="1.5"/>
  <!-- Llama principal -->
  <path d="M100,35 Q108,55 106,68 Q104,78 100,78 Q96,78 94,68 Q92,55 100,35"
        fill="url(#flame17)" opacity="0.9"/>
  <!-- Llama interior -->
  <path d="M100,50 Q104,60 103,68 Q102,74 100,74 Q98,74 97,68 Q96,60 100,50"
        fill="#F5F0E8" opacity="0.5"/>
  <!-- Resplandor -->
  <circle cx="100" cy="60" r="20" fill="#D4B87A" opacity="0.06"/>
  <circle cx="100" cy="60" r="12" fill="#D4B87A" opacity="0.08"/>
  <!-- Base de la vela -->
  <ellipse cx="100" cy="160" rx="20" ry="4" fill="none" stroke="#C4A265" stroke-width="2"/>
  <!-- Gotas de cera -->
  <path d="M86,110 Q84,116 86,118" fill="none" stroke="#F5F0E8" stroke-width="1.5" opacity="0.3"/>
</svg>
