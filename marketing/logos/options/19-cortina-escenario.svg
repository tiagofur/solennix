<?xml version="1.0" encoding="UTF-8"?>
<!-- Opcion 19: Cortinas de escenario / teatro -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg19" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B2A4A"/>
      <stop offset="100%" stop-color="#0F1A2E"/>
    </linearGradient>
    <linearGradient id="g19l" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%" stop-color="#D4B87A"/>
      <stop offset="100%" stop-color="#C4A265"/>
    </linearGradient>
    <linearGradient id="g19r" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D4B87A"/>
      <stop offset="100%" stop-color="#C4A265"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="40" fill="url(#bg19)"/>
  <!-- Barra superior -->
  <line x1="35" y1="42" x2="165" y2="42" stroke="#C4A265" stroke-width="4" stroke-linecap="round"/>
  <!-- Cortina izquierda -->
  <path d="M35,42 Q35,100 55,130 Q62,140 55,155 L35,170"
        fill="none" stroke="url(#g19l)" stroke-width="4" stroke-linecap="round"/>
  <path d="M50,42 Q48,85 60,115 Q66,128 60,140"
        fill="none" stroke="#C4A265" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
  <!-- Cortina derecha -->
  <path d="M165,42 Q165,100 145,130 Q138,140 145,155 L165,170"
        fill="none" stroke="url(#g19r)" stroke-width="4" stroke-linecap="round"/>
  <path d="M150,42 Q152,85 140,115 Q134,128 140,140"
        fill="none" stroke="#C4A265" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
  <!-- Amarres dorados -->
  <circle cx="55" cy="130" r="4" fill="#D4B87A"/>
  <circle cx="145" cy="130" r="4" fill="#D4B87A"/>
  <!-- Estrella central (escenario revelado) -->
  <polygon points="100,80 103,90 113,90 105,96 108,106 100,100 92,106 95,96 87,90 97,90"
           fill="#F5F0E8" opacity="0.6"/>
  <!-- Reflectores sutiles -->
  <circle cx="100" cy="90" r="25" fill="#D4B87A" opacity="0.04"/>
</svg>
