<?xml version="1.0" encoding="UTF-8"?>
<!-- 38: Dos copas coupe lado a lado, simetria perfecta -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg38" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B2A4A"/>
      <stop offset="100%" stop-color="#0F1A2E"/>
    </linearGradient>
    <linearGradient id="g38" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4B87A"/>
      <stop offset="100%" stop-color="#C4A265"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="40" fill="url(#bg38)"/>
  <!-- Copa izquierda (dorada) -->
  <g transform="translate(-18,0)">
    <path d="M68,60 Q68,88 100,92" fill="none" stroke="url(#g38)" stroke-width="2.5"/>
    <path d="M132,60 Q132,88 100,92" fill="none" stroke="url(#g38)" stroke-width="2.5"/>
    <line x1="68" y1="60" x2="132" y2="60" stroke="url(#g38)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="100" y1="92" x2="100" y2="130" stroke="url(#g38)" stroke-width="2.5"/>
    <line x1="84" y1="132" x2="116" y2="132" stroke="url(#g38)" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <!-- Copa derecha (crema) -->
  <g transform="translate(18,0)">
    <path d="M68,60 Q68,88 100,92" fill="none" stroke="#F5F0E8" stroke-width="2.5"/>
    <path d="M132,60 Q132,88 100,92" fill="none" stroke="#F5F0E8" stroke-width="2.5"/>
    <line x1="68" y1="60" x2="132" y2="60" stroke="#F5F0E8" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="100" y1="92" x2="100" y2="130" stroke="#F5F0E8" stroke-width="2.5"/>
    <line x1="84" y1="132" x2="116" y2="132" stroke="#F5F0E8" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <!-- Linea sutil de conexion -->
  <line x1="82" y1="150" x2="118" y2="150" stroke="#C4A265" stroke-width="0.8" opacity="0.2"/>
  <!-- Destello donde se tocan -->
  <circle cx="100" cy="60" r="2.5" fill="#D4B87A" opacity="0.5"/>
</svg>
