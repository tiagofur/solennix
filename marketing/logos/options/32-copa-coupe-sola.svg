<?xml version="1.0" encoding="UTF-8"?>
<!-- 32: Copa coupe sola (tipo Gatsby), ultra minimal -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg32" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B2A4A"/>
      <stop offset="100%" stop-color="#0F1A2E"/>
    </linearGradient>
    <linearGradient id="g32" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4B87A"/>
      <stop offset="100%" stop-color="#C4A265"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="40" fill="url(#bg32)"/>
  <!-- Copa coupe - bowl ancho y bajo -->
  <path d="M55,70 Q55,100 100,105 Q145,100 145,70" fill="none" stroke="url(#g32)" stroke-width="3"/>
  <!-- Borde superior recto -->
  <line x1="55" y1="70" x2="145" y2="70" stroke="url(#g32)" stroke-width="3" stroke-linecap="round"/>
  <!-- Tallo largo elegante -->
  <line x1="100" y1="105" x2="100" y2="150" stroke="url(#g32)" stroke-width="3"/>
  <!-- Base -->
  <ellipse cx="100" cy="153" rx="25" ry="5" fill="none" stroke="url(#g32)" stroke-width="2.5"/>
  <!-- Liquido sutil -->
  <path d="M65,75 Q65,92 100,95 Q135,92 135,75" fill="#C4A265" opacity="0.08"/>
  <!-- Reflejo -->
  <path d="M70,74 Q70,88 85,92" fill="none" stroke="#F5F0E8" stroke-width="1.5" opacity="0.2" stroke-linecap="round"/>
  <!-- Destello minimo -->
  <circle cx="135" cy="68" r="2" fill="#F5F0E8" opacity="0.4"/>
</svg>
