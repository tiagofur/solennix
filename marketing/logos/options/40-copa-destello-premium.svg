<?xml version="1.0" encoding="UTF-8"?>
<!-- 40: Copa de vino con gran destello dorado - la mas premium -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg40" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B2A4A"/>
      <stop offset="100%" stop-color="#0F1A2E"/>
    </linearGradient>
    <linearGradient id="g40" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4B87A"/>
      <stop offset="100%" stop-color="#C4A265"/>
    </linearGradient>
    <radialGradient id="glow40" cx="50%" cy="30%">
      <stop offset="0%" stop-color="#D4B87A" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#D4B87A" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" rx="40" fill="url(#bg40)"/>
  <!-- Resplandor de fondo -->
  <circle cx="100" cy="80" r="60" fill="url(#glow40)"/>
  <!-- Copa de vino elegante -->
  <path d="M68,45 L68,85 Q68,115 100,120 Q132,115 132,85 L132,45"
        fill="none" stroke="url(#g40)" stroke-width="3" stroke-linecap="round"/>
  <!-- Borde -->
  <line x1="68" y1="45" x2="132" y2="45" stroke="url(#g40)" stroke-width="3" stroke-linecap="round"/>
  <!-- Tallo -->
  <line x1="100" y1="120" x2="100" y2="150" stroke="url(#g40)" stroke-width="3"/>
  <!-- Base -->
  <ellipse cx="100" cy="154" rx="24" ry="5" fill="none" stroke="url(#g40)" stroke-width="2.5"/>
  <!-- Nivel de vino -->
  <path d="M73,72 Q100,78 127,72" fill="none" stroke="#C4A265" stroke-width="1.2" opacity="0.35"/>
  <!-- Relleno sutil -->
  <path d="M73,72 Q100,78 127,72 L132,45 L68,45 Z" fill="#C4A265" opacity="0.04"/>
  <!-- Reflejo largo -->
  <path d="M78,50 Q76,65 78,85" fill="none" stroke="#F5F0E8" stroke-width="2" opacity="0.2" stroke-linecap="round"/>
  <!-- GRAN destello estrella -->
  <g transform="translate(130,40)">
    <line x1="0" y1="-12" x2="0" y2="12" stroke="#F5F0E8" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <line x1="-12" y1="0" x2="12" y2="0" stroke="#F5F0E8" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <line x1="-7" y1="-7" x2="7" y2="7" stroke="#F5F0E8" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
    <line x1="7" y1="-7" x2="-7" y2="7" stroke="#F5F0E8" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
    <circle cx="0" cy="0" r="3" fill="#F5F0E8" opacity="0.6"/>
  </g>
  <!-- Destellos menores -->
  <circle cx="68" cy="42" r="1.5" fill="#D4B87A" opacity="0.35"/>
  <circle cx="140" cy="55" r="1" fill="#F5F0E8" opacity="0.2"/>
</svg>
