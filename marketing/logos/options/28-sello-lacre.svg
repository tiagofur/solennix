<?xml version="1.0" encoding="UTF-8"?>
<!-- Opcion 28: Sello de lacre / wax seal -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg28" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B2A4A"/>
      <stop offset="100%" stop-color="#0F1A2E"/>
    </linearGradient>
    <linearGradient id="g28" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D4B87A"/>
      <stop offset="100%" stop-color="#C4A265"/>
    </linearGradient>
    <radialGradient id="r28" cx="40%" cy="40%">
      <stop offset="0%" stop-color="#D4B87A" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#C4A265" stop-opacity="0.05"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" rx="40" fill="url(#bg28)"/>
  <!-- Borde irregular del sello (simulado con circulo wavy) -->
  <circle cx="100" cy="100" r="62" fill="url(#r28)" stroke="url(#g28)" stroke-width="3"/>
  <!-- Borde ondulado interior -->
  <path d="M100,42 Q115,45 128,55 Q140,65 145,80 Q148,95 145,110 Q140,125 130,135 Q118,148 100,150 Q82,148 70,135 Q60,125 55,110 Q52,95 55,80 Q60,65 72,55 Q85,45 100,42"
        fill="none" stroke="#C4A265" stroke-width="1" opacity="0.3"/>
  <!-- S central del sello -->
  <path d="M112,72 C120,72 124,78 118,84 C114,88 92,88 88,96 C84,104 92,110 104,110"
        fill="none" stroke="#F5F0E8" stroke-width="5" stroke-linecap="round"/>
  <!-- Decoraciones del sello -->
  <circle cx="100" cy="60" r="2" fill="#D4B87A" opacity="0.6"/>
  <circle cx="100" cy="130" r="2" fill="#D4B87A" opacity="0.6"/>
  <line x1="70" y1="66" x2="75" y2="70" stroke="#D4B87A" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
  <line x1="130" y1="66" x2="125" y2="70" stroke="#D4B87A" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
  <line x1="70" y1="124" x2="75" y2="120" stroke="#D4B87A" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
  <line x1="130" y1="124" x2="125" y2="120" stroke="#D4B87A" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
</svg>
