<?xml version="1.0" encoding="UTF-8"?>
<!-- Opcion 1: Dos aros entrelazados formando S (concepto original refinado) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B2A4A"/>
      <stop offset="100%" stop-color="#0F1A2E"/>
    </linearGradient>
    <linearGradient id="gold1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C4A265"/>
      <stop offset="50%" stop-color="#D4B87A"/>
      <stop offset="100%" stop-color="#C4A265"/>
    </linearGradient>
    <linearGradient id="cream1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5F0E8"/>
      <stop offset="100%" stop-color="#D4B87A"/>
    </linearGradient>
    <clipPath id="interClip1">
      <rect x="105" y="95" width="60" height="70"/>
    </clipPath>
  </defs>
  <rect width="200" height="200" rx="40" fill="url(#bg1)"/>
  <!-- Aro inferior (crema/claro) -->
  <circle cx="85" cy="118" r="34" fill="none" stroke="url(#cream1)" stroke-width="12"/>
  <!-- Aro superior (dorado) -->
  <circle cx="115" cy="82" r="34" fill="none" stroke="url(#gold1)" stroke-width="12"/>
  <!-- Entrelazado: parte del aro inferior pasa por encima -->
  <g clip-path="url(#interClip1)">
    <circle cx="85" cy="118" r="34" fill="none" stroke="url(#cream1)" stroke-width="12"/>
  </g>
</svg>
