<?xml version="1.0" encoding="UTF-8"?>
<!-- Opcion 9: Escudo moderno minimalista -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg9" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B2A4A"/>
      <stop offset="100%" stop-color="#0F1A2E"/>
    </linearGradient>
    <linearGradient id="gold9" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4B87A"/>
      <stop offset="100%" stop-color="#C4A265"/>
    </linearGradient>
    <linearGradient id="gold9fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C4A265" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#C4A265" stop-opacity="0.02"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="40" fill="url(#bg9)"/>
  <!-- Escudo -->
  <path d="M50,40 L150,40 L150,110 Q150,160 100,180 Q50,160 50,110 Z"
        fill="url(#gold9fill)" stroke="url(#gold9)" stroke-width="3"/>
  <!-- Linea horizontal divisoria -->
  <line x1="65" y1="85" x2="135" y2="85" stroke="#C4A265" stroke-width="1" opacity="0.4"/>
  <!-- S en el centro superior -->
  <path d="M112,55 C122,55 126,62 120,68 C116,72 94,72 90,80 C86,88 96,94 105,94"
        fill="none" stroke="#F5F0E8" stroke-width="6" stroke-linecap="round"/>
  <!-- Estrella pequeña inferior -->
  <polygon points="100,110 103,120 113,120 105,126 108,136 100,130 92,136 95,126 87,120 97,120"
           fill="#C4A265" opacity="0.6"/>
  <!-- Linea vertical sutil -->
  <line x1="100" y1="145" x2="100" y2="168" stroke="#6B7B8D" stroke-width="1" opacity="0.3"/>
</svg>
