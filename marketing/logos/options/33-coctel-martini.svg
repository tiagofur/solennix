<?xml version="1.0" encoding="UTF-8"?>
<!-- 33: Copa martini / coctel triangular -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg33" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B2A4A"/>
      <stop offset="100%" stop-color="#0F1A2E"/>
    </linearGradient>
    <linearGradient id="g33" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4B87A"/>
      <stop offset="100%" stop-color="#C4A265"/>
    </linearGradient>
    <linearGradient id="fill33" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C4A265" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#C4A265" stop-opacity="0.03"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="40" fill="url(#bg33)"/>
  <!-- Triangulo de la copa -->
  <path d="M50,55 L150,55 L100,110 Z" fill="url(#fill33)" stroke="url(#g33)" stroke-width="3" stroke-linejoin="round"/>
  <!-- Tallo -->
  <line x1="100" y1="110" x2="100" y2="150" stroke="url(#g33)" stroke-width="3"/>
  <!-- Base -->
  <line x1="72" y1="152" x2="128" y2="152" stroke="url(#g33)" stroke-width="3" stroke-linecap="round"/>
  <!-- Aceituna / garnish -->
  <circle cx="90" cy="72" r="5" fill="none" stroke="#F5F0E8" stroke-width="2"/>
  <circle cx="90" cy="72" r="1.5" fill="#F5F0E8" opacity="0.4"/>
  <!-- Pick / palillo -->
  <line x1="82" y1="62" x2="98" y2="82" stroke="#F5F0E8" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <!-- Reflejo -->
  <line x1="62" y1="58" x2="78" y2="80" stroke="#F5F0E8" stroke-width="1.2" opacity="0.15" stroke-linecap="round"/>
</svg>
