<?xml version="1.0" encoding="UTF-8"?>
<!-- 34: Dos copas de vino superpuestas / overlapping -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg34" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B2A4A"/>
      <stop offset="100%" stop-color="#0F1A2E"/>
    </linearGradient>
    <linearGradient id="g34" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4B87A"/>
      <stop offset="100%" stop-color="#C4A265"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="40" fill="url(#bg34)"/>
  <!-- Copa trasera (crema, mas atras) -->
  <g opacity="0.45">
    <path d="M72,42 L72,82 Q72,108 108,112" fill="none" stroke="#F5F0E8" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M142,42 L142,82 Q142,108 108,112" fill="none" stroke="#F5F0E8" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="72" y1="42" x2="142" y2="42" stroke="#F5F0E8" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="108" y1="112" x2="108" y2="142" stroke="#F5F0E8" stroke-width="2.5"/>
    <ellipse cx="108" cy="145" rx="18" ry="4" fill="none" stroke="#F5F0E8" stroke-width="2"/>
  </g>
  <!-- Copa frontal (dorada) -->
  <g>
    <path d="M58,52 L58,88 Q58,114 92,118" fill="none" stroke="url(#g34)" stroke-width="3" stroke-linecap="round"/>
    <path d="M128,52 L128,88 Q128,114 92,118" fill="none" stroke="url(#g34)" stroke-width="3" stroke-linecap="round"/>
    <line x1="58" y1="52" x2="128" y2="52" stroke="url(#g34)" stroke-width="3" stroke-linecap="round"/>
    <line x1="92" y1="118" x2="92" y2="148" stroke="url(#g34)" stroke-width="3"/>
    <ellipse cx="92" cy="151" rx="18" ry="4" fill="none" stroke="url(#g34)" stroke-width="2.5"/>
    <!-- Liquido -->
    <path d="M64,72 Q92,80 122,72" fill="none" stroke="#C4A265" stroke-width="1" opacity="0.3"/>
    <!-- Reflejo -->
    <path d="M68,56 L68,78" stroke="#F5F0E8" stroke-width="1.5" opacity="0.2" stroke-linecap="round"/>
  </g>
</svg>
