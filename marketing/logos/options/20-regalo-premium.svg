<?xml version="1.0" encoding="UTF-8"?>
<!-- Opcion 20: Caja de regalo premium -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg20" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B2A4A"/>
      <stop offset="100%" stop-color="#0F1A2E"/>
    </linearGradient>
    <linearGradient id="g20" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C4A265"/>
      <stop offset="100%" stop-color="#D4B87A"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="40" fill="url(#bg20)"/>
  <!-- Caja inferior -->
  <rect x="50" y="95" width="100" height="65" rx="4" fill="none" stroke="url(#g20)" stroke-width="3"/>
  <!-- Tapa -->
  <rect x="45" y="80" width="110" height="20" rx="4" fill="none" stroke="url(#g20)" stroke-width="3"/>
  <!-- Cinta vertical -->
  <line x1="100" y1="80" x2="100" y2="160" stroke="#F5F0E8" stroke-width="4"/>
  <!-- Cinta horizontal -->
  <line x1="45" y1="90" x2="155" y2="90" stroke="#F5F0E8" stroke-width="4"/>
  <!-- Lazo izquierdo -->
  <path d="M100,80 Q80,55 70,60 Q60,65 80,80" fill="none" stroke="#F5F0E8" stroke-width="3" stroke-linecap="round"/>
  <!-- Lazo derecho -->
  <path d="M100,80 Q120,55 130,60 Q140,65 120,80" fill="none" stroke="#F5F0E8" stroke-width="3" stroke-linecap="round"/>
  <!-- Nudo -->
  <circle cx="100" cy="78" r="5" fill="#D4B87A"/>
  <!-- Destellos -->
  <line x1="135" y1="45" x2="135" y2="50" stroke="#D4B87A" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="145" y1="55" x2="148" y2="52" stroke="#D4B87A" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="142" y1="42" x2="145" y2="45" stroke="#D4B87A" stroke-width="1" stroke-linecap="round" opacity="0.3"/>
</svg>
