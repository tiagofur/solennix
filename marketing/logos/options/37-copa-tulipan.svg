<?xml version="1.0" encoding="UTF-8"?>
<!-- Solennix Icon: Copa Tulipan (Final) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <!-- Fondo navy con gradiente diagonal -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B2A4A"/>
      <stop offset="100%" stop-color="#0F1A2E"/>
    </linearGradient>

    <!-- Dorado principal (de arriba hacia abajo) -->
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4B87A"/>
      <stop offset="45%" stop-color="#C4A265"/>
      <stop offset="100%" stop-color="#B8965A"/>
    </linearGradient>

    <!-- Dorado para la base (horizontal, da volumen) -->
    <linearGradient id="goldH" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#B8965A"/>
      <stop offset="50%" stop-color="#D4B87A"/>
      <stop offset="100%" stop-color="#B8965A"/>
    </linearGradient>

    <!-- Relleno sutil del liquido -->
    <linearGradient id="liquidFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C4A265" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#C4A265" stop-opacity="0.04"/>
    </linearGradient>

    <!-- Glow sutil detras de la copa -->
    <radialGradient id="glow" cx="50%" cy="38%">
      <stop offset="0%" stop-color="#D4B87A" stop-opacity="0.07"/>
      <stop offset="70%" stop-color="#D4B87A" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#D4B87A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ═══ FONDO ═══ -->
  <rect width="200" height="200" rx="40" fill="url(#bg)"/>

  <!-- Resplandor ambiental sutil -->
  <circle cx="100" cy="78" r="65" fill="url(#glow)"/>

  <!-- ═══ COPA TULIPAN ═══ -->
  <!-- Bowl: curvas organicas tipo tulipan, ligeramente mas grande -->
  <path d="M66,34 Q58,65 66,88 Q78,116 100,122 Q122,116 134,88 Q142,65 134,34"
        fill="none" stroke="url(#gold)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Borde superior (labio de la copa, curvatura sutil) -->
  <path d="M66,34 Q100,42 134,34"
        fill="none" stroke="url(#goldH)" stroke-width="3" stroke-linecap="round"/>

  <!-- Relleno del liquido (zona entre labio y linea de liquido) -->
  <path d="M72,68 Q100,76 128,68 L134,34 Q100,42 66,34 Z"
        fill="url(#liquidFill)"/>

  <!-- Linea de liquido -->
  <path d="M72,68 Q100,76 128,68"
        fill="none" stroke="#C4A265" stroke-width="1.2" opacity="0.35"/>

  <!-- Reflejo largo en el vidrio (lado izquierdo) -->
  <path d="M76,40 Q72,58 76,80"
        fill="none" stroke="#F5F0E8" stroke-width="1.8" opacity="0.18" stroke-linecap="round"/>

  <!-- Reflejo corto en el vidrio (lado derecho) -->
  <path d="M124,40 Q126,50 124,58"
        fill="none" stroke="#F5F0E8" stroke-width="1.2" opacity="0.1" stroke-linecap="round"/>

  <!-- ═══ TALLO ═══ -->
  <!-- Nodo elegante (donde bowl se une al tallo) -->
  <ellipse cx="100" cy="124" rx="5" ry="2.5" fill="none" stroke="url(#gold)" stroke-width="2"/>

  <!-- ═══ TALLO ═══ -->
  <path d="M100,126 L100,150 Q100,155 88,158 L72,160"
        fill="none" stroke="url(#gold)" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M100,126 L100,150 Q100,155 112,158 L128,160"
        fill="none" stroke="url(#gold)" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ═══ BASE: semicirculo inferior ═══ -->
  <path d="M72,160 A28,7 0 0,0 128,160"
        fill="none" stroke="url(#goldH)" stroke-width="2.8" stroke-linecap="round"/>

  <!-- ═══ DESTELLOS ═══ -->
  <!-- Destello principal (estrella de 4 puntas en el borde de la copa) -->
  <g transform="translate(132,32)" opacity="0.65">
    <line x1="0" y1="-8" x2="0" y2="8" stroke="#F5F0E8" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-8" y1="0" x2="8" y2="0" stroke="#F5F0E8" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-4" y1="-4" x2="4" y2="4" stroke="#F5F0E8" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="4" y1="-4" x2="-4" y2="4" stroke="#F5F0E8" stroke-width="0.8" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="2" fill="#F5F0E8" opacity="0.5"/>
  </g>

  <!-- Destello secundario (arriba izquierda, mas pequeno) -->
  <g transform="translate(72,30)" opacity="0.35">
    <line x1="0" y1="-5" x2="0" y2="5" stroke="#D4B87A" stroke-width="1" stroke-linecap="round"/>
    <line x1="-5" y1="0" x2="5" y2="0" stroke="#D4B87A" stroke-width="1" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="1.5" fill="#D4B87A" opacity="0.4"/>
  </g>

  <!-- Micro-destellos dispersos -->
  <circle cx="142" cy="50" r="1" fill="#F5F0E8" opacity="0.2"/>
  <circle cx="60" cy="46" r="0.8" fill="#D4B87A" opacity="0.15"/>
  <circle cx="118" cy="24" r="0.8" fill="#F5F0E8" opacity="0.2"/>
</svg>
