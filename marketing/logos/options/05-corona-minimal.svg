<?xml version="1.0" encoding="UTF-8"?>
<!-- Opcion 5: Corona minimalista (3 picos) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B2A4A"/>
      <stop offset="100%" stop-color="#0F1A2E"/>
    </linearGradient>
    <linearGradient id="gold5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C4A265"/>
      <stop offset="50%" stop-color="#D4B87A"/>
      <stop offset="100%" stop-color="#C4A265"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="40" fill="url(#bg5)"/>
  <!-- Corona - forma limpia -->
  <path d="M45,130 L55,70 L80,100 L100,55 L120,100 L145,70 L155,130 Z"
        fill="none" stroke="url(#gold5)" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Banda inferior de la corona -->
  <line x1="45" y1="130" x2="155" y2="130" stroke="url(#gold5)" stroke-width="5" stroke-linecap="round"/>
  <!-- Joyas en los picos -->
  <circle cx="100" cy="55" r="5" fill="#F5F0E8"/>
  <circle cx="55" cy="70" r="3.5" fill="#D4B87A"/>
  <circle cx="145" cy="70" r="3.5" fill="#D4B87A"/>
  <!-- Linea sutil debajo -->
  <line x1="60" y1="145" x2="140" y2="145" stroke="#6B7B8D" stroke-width="1.5" opacity="0.3"/>
</svg>
