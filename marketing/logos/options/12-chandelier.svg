<?xml version="1.0" encoding="UTF-8"?>
<!-- Opcion 12: Chandelier / candelabro minimalista -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg12" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B2A4A"/>
      <stop offset="100%" stop-color="#0F1A2E"/>
    </linearGradient>
    <linearGradient id="g12" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4B87A"/>
      <stop offset="100%" stop-color="#C4A265"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="40" fill="url(#bg12)"/>
  <!-- Cadena superior -->
  <line x1="100" y1="28" x2="100" y2="50" stroke="#6B7B8D" stroke-width="2"/>
  <circle cx="100" cy="28" r="3" fill="#C4A265"/>
  <!-- Barra horizontal principal -->
  <line x1="45" y1="65" x2="155" y2="65" stroke="url(#g12)" stroke-width="3" stroke-linecap="round"/>
  <!-- Curvas descendentes -->
  <path d="M45,65 Q45,95 65,100" fill="none" stroke="url(#g12)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M155,65 Q155,95 135,100" fill="none" stroke="url(#g12)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M72,65 Q65,90 80,100" fill="none" stroke="url(#g12)" stroke-width="2" stroke-linecap="round"/>
  <path d="M128,65 Q135,90 120,100" fill="none" stroke="url(#g12)" stroke-width="2" stroke-linecap="round"/>
  <!-- Centro -->
  <path d="M100,65 L100,105" stroke="url(#g12)" stroke-width="2.5"/>
  <!-- Llamas / luces -->
  <ellipse cx="65" cy="96" rx="3" ry="6" fill="#F5F0E8" opacity="0.9"/>
  <ellipse cx="80" cy="96" rx="2.5" ry="5" fill="#F5F0E8" opacity="0.7"/>
  <ellipse cx="100" cy="100" rx="4" ry="8" fill="#F5F0E8" opacity="0.95"/>
  <ellipse cx="120" cy="96" rx="2.5" ry="5" fill="#F5F0E8" opacity="0.7"/>
  <ellipse cx="135" cy="96" rx="3" ry="6" fill="#F5F0E8" opacity="0.9"/>
  <!-- Gota cristal central -->
  <path d="M100,113 Q97,125 100,135 Q103,125 100,113" fill="#C4A265" opacity="0.5"/>
  <!-- Gotas laterales -->
  <circle cx="65" cy="108" r="2" fill="#C4A265" opacity="0.3"/>
  <circle cx="135" cy="108" r="2" fill="#C4A265" opacity="0.3"/>
  <!-- Base decorativa -->
  <line x1="75" y1="155" x2="125" y2="155" stroke="#C4A265" stroke-width="1" opacity="0.2"/>
</svg>
