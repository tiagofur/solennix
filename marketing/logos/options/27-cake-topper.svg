<?xml version="1.0" encoding="UTF-8"?>
<!-- Opcion 27: Pastel de celebracion minimalista -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg27" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B2A4A"/>
      <stop offset="100%" stop-color="#0F1A2E"/>
    </linearGradient>
    <linearGradient id="g27" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4B87A"/>
      <stop offset="100%" stop-color="#C4A265"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="40" fill="url(#bg27)"/>
  <!-- Piso 3 (superior - mas chico) -->
  <rect x="78" y="85" width="44" height="25" rx="4" fill="none" stroke="url(#g27)" stroke-width="2.5"/>
  <!-- Piso 2 (medio) -->
  <rect x="62" y="110" width="76" height="25" rx="4" fill="none" stroke="url(#g27)" stroke-width="2.5"/>
  <!-- Piso 1 (base - mas grande) -->
  <rect x="46" y="135" width="108" height="25" rx="4" fill="none" stroke="url(#g27)" stroke-width="2.5"/>
  <!-- Decoracion entre pisos -->
  <path d="M78,110 Q85,105 92,110" fill="none" stroke="#C4A265" stroke-width="1" opacity="0.4"/>
  <path d="M92,110 Q99,105 106,110" fill="none" stroke="#C4A265" stroke-width="1" opacity="0.4"/>
  <path d="M106,110 Q113,105 122,110" fill="none" stroke="#C4A265" stroke-width="1" opacity="0.4"/>
  <!-- Vela central -->
  <line x1="100" y1="68" x2="100" y2="85" stroke="#F5F0E8" stroke-width="3" stroke-linecap="round"/>
  <!-- Llama -->
  <path d="M100,48 Q104,56 103,64 Q101,68 100,68 Q99,68 97,64 Q96,56 100,48"
        fill="#D4B87A" opacity="0.85"/>
  <path d="M100,55 Q102,60 101,64 Q100,66 100,66 Q100,66 99,64 Q98,60 100,55"
        fill="#F5F0E8" opacity="0.5"/>
  <!-- Base del pastel -->
  <line x1="42" y1="163" x2="158" y2="163" stroke="#C4A265" stroke-width="1.5" opacity="0.3"/>
</svg>
