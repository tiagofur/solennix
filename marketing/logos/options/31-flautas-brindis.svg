<?xml version="1.0" encoding="UTF-8"?>
<!-- 31: Dos flautas de champagne brindando, lineas finas -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg31" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B2A4A"/>
      <stop offset="100%" stop-color="#0F1A2E"/>
    </linearGradient>
    <linearGradient id="g31" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4B87A"/>
      <stop offset="100%" stop-color="#C4A265"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="40" fill="url(#bg31)"/>
  <!-- Flauta izquierda (crema) -->
  <g transform="translate(72,100) rotate(-10)">
    <path d="M-6,-58 L6,-58 L5,-15 Q0,-10 0,-10 Q0,-10 -5,-15 Z" fill="none" stroke="#F5F0E8" stroke-width="2.5" stroke-linejoin="round"/>
    <line x1="0" y1="-10" x2="0" y2="22" stroke="#F5F0E8" stroke-width="2.5"/>
    <ellipse cx="0" cy="24" rx="10" ry="3" fill="none" stroke="#F5F0E8" stroke-width="2"/>
    <!-- Burbujas -->
    <circle cx="-1" cy="-30" r="1.5" fill="#F5F0E8" opacity="0.3"/>
    <circle cx="2" cy="-40" r="1" fill="#F5F0E8" opacity="0.25"/>
    <circle cx="-2" cy="-48" r="1.2" fill="#F5F0E8" opacity="0.2"/>
  </g>
  <!-- Flauta derecha (dorada) -->
  <g transform="translate(128,100) rotate(10)">
    <path d="M-6,-58 L6,-58 L5,-15 Q0,-10 0,-10 Q0,-10 -5,-15 Z" fill="none" stroke="url(#g31)" stroke-width="2.5" stroke-linejoin="round"/>
    <line x1="0" y1="-10" x2="0" y2="22" stroke="url(#g31)" stroke-width="2.5"/>
    <ellipse cx="0" cy="24" rx="10" ry="3" fill="none" stroke="url(#g31)" stroke-width="2"/>
    <circle cx="1" cy="-32" r="1.5" fill="#D4B87A" opacity="0.3"/>
    <circle cx="-1" cy="-42" r="1" fill="#D4B87A" opacity="0.25"/>
  </g>
  <!-- Destello del choque -->
  <circle cx="100" cy="44" r="3.5" fill="#D4B87A" opacity="0.7"/>
  <line x1="100" y1="32" x2="100" y2="37" stroke="#D4B87A" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="90" y1="38" x2="93" y2="41" stroke="#D4B87A" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <line x1="110" y1="38" x2="107" y2="41" stroke="#D4B87A" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
</svg>
