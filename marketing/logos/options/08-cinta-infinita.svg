<?xml version="1.0" encoding="UTF-8"?>
<!-- Opcion 8: Cinta infinita / lazo elegante -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg8" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B2A4A"/>
      <stop offset="100%" stop-color="#0F1A2E"/>
    </linearGradient>
    <linearGradient id="gold8a" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C4A265"/>
      <stop offset="100%" stop-color="#D4B87A"/>
    </linearGradient>
    <linearGradient id="gold8b" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%" stop-color="#C4A265"/>
      <stop offset="100%" stop-color="#D4B87A"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="40" fill="url(#bg8)"/>
  <!-- Lazo / infinity ribbon -->
  <!-- Parte izquierda -->
  <path d="M100,100 C100,60 50,50 50,85 C50,115 100,100 100,100"
        fill="none" stroke="url(#gold8a)" stroke-width="8" stroke-linecap="round"/>
  <!-- Parte derecha -->
  <path d="M100,100 C100,140 150,150 150,115 C150,85 100,100 100,100"
        fill="none" stroke="url(#gold8b)" stroke-width="8" stroke-linecap="round"/>
  <!-- Parte izquierda frente (crema, pasa por encima en el cruce) -->
  <path d="M100,100 C100,140 50,150 50,115 C50,85 100,100 100,100"
        fill="none" stroke="#F5F0E8" stroke-width="8" stroke-linecap="round"/>
  <!-- Parte derecha frente -->
  <path d="M100,100 C100,60 150,50 150,85 C150,115 100,100 100,100"
        fill="none" stroke="#F5F0E8" stroke-width="8" stroke-linecap="round"/>
  <!-- Centro highlight -->
  <circle cx="100" cy="100" r="4" fill="#D4B87A"/>
</svg>
