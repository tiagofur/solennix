<?xml version="1.0" encoding="UTF-8"?>
<!-- Opcion 13: Mesa/plato elegante con cubiertos minimalistas -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg13" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B2A4A"/>
      <stop offset="100%" stop-color="#0F1A2E"/>
    </linearGradient>
    <linearGradient id="g13" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C4A265"/>
      <stop offset="100%" stop-color="#D4B87A"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="40" fill="url(#bg13)"/>
  <!-- Plato - circulo principal -->
  <circle cx="100" cy="100" r="52" fill="none" stroke="url(#g13)" stroke-width="2.5"/>
  <circle cx="100" cy="100" r="42" fill="none" stroke="#C4A265" stroke-width="1" opacity="0.25"/>
  <!-- Tenedor izquierdo -->
  <g transform="translate(38,60)">
    <line x1="0" y1="0" x2="0" y2="80" stroke="#F5F0E8" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-5" y1="0" x2="-5" y2="22" stroke="#F5F0E8" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="5" y1="0" x2="5" y2="22" stroke="#F5F0E8" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="0" y2="22" stroke="#F5F0E8" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <!-- Cuchillo derecho -->
  <g transform="translate(162,60)">
    <line x1="0" y1="0" x2="0" y2="80" stroke="#F5F0E8" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M0,0 Q6,10 5,25 L0,25" fill="none" stroke="#F5F0E8" stroke-width="1.5"/>
  </g>
  <!-- Detalle central - estrella sutil -->
  <circle cx="100" cy="100" r="3" fill="#C4A265" opacity="0.5"/>
</svg>
