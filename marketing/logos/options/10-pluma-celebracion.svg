<?xml version="1.0" encoding="UTF-8"?>
<!-- Opcion 10: Pluma/hoja estilizada formando una S -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg10" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B2A4A"/>
      <stop offset="100%" stop-color="#0F1A2E"/>
    </linearGradient>
    <linearGradient id="gold10" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#D4B87A"/>
      <stop offset="100%" stop-color="#C4A265"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="40" fill="url(#bg10)"/>
  <!-- Pluma/hoja superior (dorado) - curva hacia la derecha -->
  <path d="M100,100 C100,100 130,85 140,60 C150,35 135,25 115,35 C95,45 90,70 100,100"
        fill="url(#gold10)" opacity="0.85"/>
  <!-- Pluma/hoja inferior (crema) - curva hacia la izquierda -->
  <path d="M100,100 C100,100 70,115 60,140 C50,165 65,175 85,165 C105,155 110,130 100,100"
        fill="#F5F0E8" opacity="0.7"/>
  <!-- Vena central de hoja superior -->
  <path d="M100,100 C105,85 115,65 125,45" fill="none" stroke="#0F1A2E" stroke-width="1.5" opacity="0.3"/>
  <!-- Vena central de hoja inferior -->
  <path d="M100,100 C95,115 85,135 75,155" fill="none" stroke="#1B2A4A" stroke-width="1.5" opacity="0.3"/>
  <!-- Punto central -->
  <circle cx="100" cy="100" r="5" fill="#1B2A4A" stroke="#C4A265" stroke-width="2"/>
</svg>
