<?xml version="1.0" encoding="UTF-8"?>
<!-- Opcion 3: Doble arco que forma una S abstracta -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B2A4A"/>
      <stop offset="100%" stop-color="#0F1A2E"/>
    </linearGradient>
    <linearGradient id="gold3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C4A265"/>
      <stop offset="100%" stop-color="#D4B87A"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="40" fill="url(#bg3)"/>
  <!-- Arco superior (dorado) - abre hacia abajo -->
  <path d="M55,90 C55,50 100,35 145,65" fill="none" stroke="url(#gold3)" stroke-width="10" stroke-linecap="round"/>
  <!-- Arco inferior (crema) - abre hacia arriba -->
  <path d="M55,135 C100,165 145,150 145,110" fill="none" stroke="#F5F0E8" stroke-width="10" stroke-linecap="round"/>
  <!-- Linea central conectora (gris suave, sutil) -->
  <line x1="100" y1="78" x2="100" y2="122" stroke="#6B7B8D" stroke-width="2" opacity="0.4"/>
  <!-- Punto decorativo centro -->
  <circle cx="100" cy="100" r="5" fill="#C4A265"/>
</svg>
