<?xml version="1.0" encoding="UTF-8"?>
<!-- 39: Copa abstracta hecha de lineas geometricas -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg39" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B2A4A"/>
      <stop offset="100%" stop-color="#0F1A2E"/>
    </linearGradient>
    <linearGradient id="g39" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4B87A"/>
      <stop offset="100%" stop-color="#C4A265"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="40" fill="url(#bg39)"/>
  <!-- Copa construida con segmentos rectos -->
  <!-- Lado izquierdo -->
  <line x1="60" y1="45" x2="60" y2="62" stroke="url(#g39)" stroke-width="3" stroke-linecap="round"/>
  <line x1="60" y1="62" x2="70" y2="82" stroke="url(#g39)" stroke-width="3" stroke-linecap="round"/>
  <line x1="70" y1="82" x2="85" y2="98" stroke="url(#g39)" stroke-width="3" stroke-linecap="round"/>
  <line x1="85" y1="98" x2="100" y2="105" stroke="url(#g39)" stroke-width="3" stroke-linecap="round"/>
  <!-- Lado derecho -->
  <line x1="140" y1="45" x2="140" y2="62" stroke="url(#g39)" stroke-width="3" stroke-linecap="round"/>
  <line x1="140" y1="62" x2="130" y2="82" stroke="url(#g39)" stroke-width="3" stroke-linecap="round"/>
  <line x1="130" y1="82" x2="115" y2="98" stroke="url(#g39)" stroke-width="3" stroke-linecap="round"/>
  <line x1="115" y1="98" x2="100" y2="105" stroke="url(#g39)" stroke-width="3" stroke-linecap="round"/>
  <!-- Borde superior -->
  <line x1="60" y1="45" x2="140" y2="45" stroke="url(#g39)" stroke-width="3" stroke-linecap="round"/>
  <!-- Tallo -->
  <line x1="100" y1="105" x2="100" y2="145" stroke="url(#g39)" stroke-width="3" stroke-linecap="round"/>
  <!-- Base -->
  <line x1="72" y1="148" x2="128" y2="148" stroke="url(#g39)" stroke-width="3" stroke-linecap="round"/>
  <!-- Linea de liquido -->
  <line x1="64" y1="68" x2="136" y2="68" stroke="#F5F0E8" stroke-width="1.5" opacity="0.25" stroke-linecap="round"/>
  <!-- Vertices destacados -->
  <circle cx="60" cy="62" r="2" fill="#F5F0E8" opacity="0.3"/>
  <circle cx="140" cy="62" r="2" fill="#F5F0E8" opacity="0.3"/>
  <circle cx="100" cy="105" r="2.5" fill="#D4B87A" opacity="0.5"/>
</svg>
