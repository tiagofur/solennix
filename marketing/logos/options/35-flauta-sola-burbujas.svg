<?xml version="1.0" encoding="UTF-8"?>
<!-- 35: Flauta de champagne sola con burbujas ascendentes -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg35" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B2A4A"/>
      <stop offset="100%" stop-color="#0F1A2E"/>
    </linearGradient>
    <linearGradient id="g35" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4B87A"/>
      <stop offset="100%" stop-color="#C4A265"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="40" fill="url(#bg35)"/>
  <!-- Flauta alta -->
  <path d="M86,42 L86,105 Q86,118 100,120 Q114,118 114,105 L114,42"
        fill="none" stroke="url(#g35)" stroke-width="3" stroke-linecap="round"/>
  <!-- Borde superior -->
  <line x1="86" y1="42" x2="114" y2="42" stroke="url(#g35)" stroke-width="3" stroke-linecap="round"/>
  <!-- Tallo -->
  <line x1="100" y1="120" x2="100" y2="152" stroke="url(#g35)" stroke-width="3"/>
  <!-- Base -->
  <ellipse cx="100" cy="155" rx="22" ry="5" fill="none" stroke="url(#g35)" stroke-width="2.5"/>
  <!-- Nivel de champagne -->
  <path d="M89,68 L111,68" stroke="#C4A265" stroke-width="1" opacity="0.35"/>
  <rect x="89" y="68" width="22" height="40" rx="0" fill="#C4A265" opacity="0.06"/>
  <!-- Burbujas subiendo -->
  <circle cx="96" cy="95" r="2" fill="#F5F0E8" opacity="0.2"/>
  <circle cx="102" cy="85" r="1.5" fill="#F5F0E8" opacity="0.25"/>
  <circle cx="98" cy="76" r="2" fill="#F5F0E8" opacity="0.3"/>
  <circle cx="104" cy="62" r="1.5" fill="#F5F0E8" opacity="0.2"/>
  <!-- Burbujas que salen (celebracion) -->
  <circle cx="108" cy="38" r="2.5" fill="#D4B87A" opacity="0.3"/>
  <circle cx="118" cy="32" r="2" fill="#D4B87A" opacity="0.25"/>
  <circle cx="90" cy="35" r="1.8" fill="#D4B87A" opacity="0.2"/>
  <circle cx="82" cy="30" r="1.5" fill="#D4B87A" opacity="0.15"/>
  <circle cx="122" cy="40" r="1.2" fill="#D4B87A" opacity="0.15"/>
</svg>
