<?xml version="1.0" encoding="UTF-8"?>
<!-- Opcion 11: Dos copas de champagne brindando -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg11" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B2A4A"/>
      <stop offset="100%" stop-color="#0F1A2E"/>
    </linearGradient>
    <linearGradient id="g11" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4B87A"/>
      <stop offset="100%" stop-color="#C4A265"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="40" fill="url(#bg11)"/>
  <!-- Copa izquierda inclinada -->
  <g transform="translate(68,105) rotate(-12)">
    <path d="M-14,-55 L14,-55 L8,-20 L0,-15 L-8,-20 Z" fill="none" stroke="#F5F0E8" stroke-width="3.5" stroke-linejoin="round"/>
    <line x1="0" y1="-15" x2="0" y2="15" stroke="#F5F0E8" stroke-width="3"/>
    <line x1="-10" y1="15" x2="10" y2="15" stroke="#F5F0E8" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- Copa derecha inclinada -->
  <g transform="translate(132,105) rotate(12)">
    <path d="M-14,-55 L14,-55 L8,-20 L0,-15 L-8,-20 Z" fill="none" stroke="url(#g11)" stroke-width="3.5" stroke-linejoin="round"/>
    <line x1="0" y1="-15" x2="0" y2="15" stroke="url(#g11)" stroke-width="3"/>
    <line x1="-10" y1="15" x2="10" y2="15" stroke="url(#g11)" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- Destello del brindis -->
  <circle cx="100" cy="52" r="3" fill="#D4B87A"/>
  <line x1="100" y1="38" x2="100" y2="44" stroke="#D4B87A" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="88" y1="45" x2="92" y2="49" stroke="#D4B87A" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="112" y1="45" x2="108" y2="49" stroke="#D4B87A" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="86" y1="56" x2="91" y2="55" stroke="#D4B87A" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <line x1="114" y1="56" x2="109" y2="55" stroke="#D4B87A" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
</svg>
