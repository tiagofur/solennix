  <!-- Labio -->
  <path d="M66,34 Q100,42 134,34" fill="none" stroke="url(#gTH)" stroke-width="3" stroke-linecap="round"/>

  <!-- Reflejo -->
  <path d="M76,40 Q72,58 76,80" fill="none" stroke="#F5F0E8" stroke-width="1.8" opacity="0.25" stroke-linecap="round"/>

  <!-- Nodo -->
  <ellipse cx="100" cy="124" rx="5" ry="2.5" fill="none" stroke="url(#gT)" stroke-width="2"/>

  <!-- Tallo -->
  <path d="M100,126 L100,150 Q100,155 88,158 L72,160"
