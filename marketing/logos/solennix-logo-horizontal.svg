<?xml version="1.0" encoding="UTF-8"?>
<!-- Solennix — Logo Horizontal Completo (Copa Tulipan + Wordmark + Tagline) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 140">
  <defs>
    <!-- Fondo navy -->
    <linearGradient id="bgH" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B2A4A"/>
      <stop offset="100%" stop-color="#0F1A2E"/>
    </linearGradient>

    <!-- Dorado vertical -->
    <linearGradient id="goldV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4B87A"/>
      <stop offset="45%" stop-color="#C4A265"/>
      <stop offset="100%" stop-color="#B8965A"/>
    </linearGradient>

    <!-- Dorado horizontal -->
    <linearGradient id="goldHr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#B8965A"/>
      <stop offset="50%" stop-color="#D4B87A"/>
      <stop offset="100%" stop-color="#B8965A"/>
    </linearGradient>

    <!-- Relleno liquido sutil -->
    <linearGradient id="liqH" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C4A265" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#C4A265" stop-opacity="0.04"/>
    </linearGradient>

    <!-- Glow -->
    <radialGradient id="glowH" cx="50%" cy="38%">
      <stop offset="0%" stop-color="#D4B87A" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#D4B87A" stop-opacity="0"/>
    </radialGradient>

    <!-- Gradiente del texto wordmark -->
    <linearGradient id="textGold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C4A265"/>
      <stop offset="40%" stop-color="#D4B87A"/>
      <stop offset="60%" stop-color="#F5F0E8"/>
      <stop offset="80%" stop-color="#D4B87A"/>
      <stop offset="100%" stop-color="#C4A265"/>
    </linearGradient>

    <!-- Linea decorativa con fade -->
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C4A265" stop-opacity="0"/>
      <stop offset="15%" stop-color="#C4A265" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#D4B87A" stop-opacity="0.7"/>
      <stop offset="85%" stop-color="#C4A265" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#C4A265" stop-opacity="0"/>
    </linearGradient>

    <!-- Glow para texto -->
    <filter id="textGlow" x="-5%" y="-15%" width="110%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feFlood flood-color="#C4A265" flood-opacity="0.12" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ═══ FONDO ═══ -->
  <rect width="520" height="140" rx="20" fill="url(#bgH)"/>

  <!-- ═══════════════════════════════════════════ -->
  <!-- ICONO: Copa Tulipan (centrada en 0-140)     -->
  <!-- ═══════════════════════════════════════════ -->
  <g transform="translate(12,2) scale(0.95)">
    <!-- Glow ambiental -->
    <circle cx="70" cy="55" r="48" fill="url(#glowH)"/>

    <!-- Bowl -->
    <path d="M46,22 Q40,48 46,66 Q55,88 70,92 Q85,88 94,66 Q100,48 94,22"
          fill="none" stroke="url(#goldV)" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Labio -->
    <path d="M46,22 Q70,29 94,22"
          fill="none" stroke="url(#goldHr)" stroke-width="2.8" stroke-linecap="round"/>

    <!-- Relleno liquido -->
    <path d="M51,50 Q70,56 89,50 L94,22 Q70,29 46,22 Z" fill="url(#liqH)"/>

    <!-- Linea de liquido -->
    <path d="M51,50 Q70,56 89,50" fill="none" stroke="#C4A265" stroke-width="1" opacity="0.35"/>

    <!-- Reflejo -->
    <path d="M54,27 Q51,42 54,58" fill="none" stroke="#F5F0E8" stroke-width="1.5" opacity="0.16" stroke-linecap="round"/>

    <!-- Nodo (union bowl-tallo) -->
    <ellipse cx="70" cy="94" rx="4" ry="2" fill="none" stroke="url(#goldV)" stroke-width="1.8"/>

    <!-- Tallo que se ensancha hacia la base -->
    <path d="M70,96 L70,114 Q70,118 60,120 L48,122"
          fill="none" stroke="url(#goldV)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M70,96 L70,114 Q70,118 80,120 L92,122"
          fill="none" stroke="url(#goldV)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Base: semicirculo inferior -->
    <path d="M48,122 A22,5.5 0 0,0 92,122"
          fill="none" stroke="url(#goldHr)" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Destello principal -->
    <g transform="translate(93,20)" opacity="0.6">
      <line x1="0" y1="-6" x2="0" y2="6" stroke="#F5F0E8" stroke-width="1.3" stroke-linecap="round"/>
      <line x1="-6" y1="0" x2="6" y2="0" stroke="#F5F0E8" stroke-width="1.3" stroke-linecap="round"/>
      <line x1="-3" y1="-3" x2="3" y2="3" stroke="#F5F0E8" stroke-width="0.7" stroke-linecap="round"/>
      <line x1="3" y1="-3" x2="-3" y2="3" stroke="#F5F0E8" stroke-width="0.7" stroke-linecap="round"/>
      <circle cx="0" cy="0" r="1.5" fill="#F5F0E8" opacity="0.45"/>
    </g>

    <!-- Destello secundario -->
    <g transform="translate(50,19)" opacity="0.3">
      <line x1="0" y1="-4" x2="0" y2="4" stroke="#D4B87A" stroke-width="0.8" stroke-linecap="round"/>
      <line x1="-4" y1="0" x2="4" y2="0" stroke="#D4B87A" stroke-width="0.8" stroke-linecap="round"/>
    </g>

    <!-- Micro destellos -->
    <circle cx="100" cy="35" r="0.8" fill="#F5F0E8" opacity="0.18"/>
    <circle cx="42" cy="32" r="0.6" fill="#D4B87A" opacity="0.14"/>
  </g>

  <!-- ═══════════════════════════════════════════ -->
  <!-- WORDMARK: "Solennix"                        -->
  <!-- ═══════════════════════════════════════════ -->
  <text x="155" y="72"
        font-family="Cinzel, 'Playfair Display', Didot, 'Bodoni MT', Georgia, serif"
        font-size="48"
        font-weight="600"
        letter-spacing="4"
        fill="url(#textGold)"
        filter="url(#textGlow)">Solennix</text>

  <!-- ═══ LINEA DECORATIVA ═══ -->
  <line x1="155" y1="86" x2="500" y2="86"
        stroke="url(#lineGrad)" stroke-width="0.8"/>

  <!-- ═══ TAGLINE ═══ -->
  <text x="155" y="108"
        font-family="'Helvetica Neue', 'Segoe UI', Arial, sans-serif"
        font-size="13"
        font-weight="300"
        letter-spacing="5.5"
        fill="#6B7B8D">CADA DETALLE IMPORTA</text>
</svg>
