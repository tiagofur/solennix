<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Story — Quedan X Lugares</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Montserrat:wght@300;400;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #333; }

  .story {
    width: 1080px; height: 1920px;
    background: #1B2A4A;
    position: relative; overflow: hidden;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }

  /* Radial glow behind number */
  .story::before {
    content: '';
    position: absolute;
    top: 35%; left: 50%;
    transform: translate(-50%, -50%);
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(201,169,110,0.15) 0%, transparent 60%);
  }

  .logo {
    position: absolute;
    top: 80px;
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 24px;
    color: #C9A96E;
    letter-spacing: 8px;
  }

  .content {
    position: relative; z-index: 2;
    display: flex; flex-direction: column;
    align-items: center; text-align: center;
    margin-top: -100px;
  }

  .big-number {
    font-family: 'Cinzel', serif;
    font-weight: 900;
    font-size: 280px;
    color: #C9A96E;
    line-height: 1;
    text-shadow:
      0 0 60px rgba(201,169,110,0.4),
      0 0 120px rgba(201,169,110,0.2);
  }

  .label {
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    font-size: 40px;
    color: #FAF6F0;
    letter-spacing: 8px;
    text-transform: uppercase;
    margin-top: 10px;
    margin-bottom: 80px;
  }

  /* Progress bar */
  .progress-container {
    width: 600px;
    margin-bottom: 20px;
  }

  .progress-bar {
    width: 100%;
    height: 16px;
    background: rgba(250,246,240,0.1);
    border-radius: 8px;
    overflow: hidden;
  }

  .progress-fill {
    /* Change width to match: (20 - remaining) / 20 * 100% */
    /* Example: 13 of 20 taken = 65% */
    width: 65%;
    height: 100%;
    background: linear-gradient(to right, #C9A96E, #d4b87e);
    border-radius: 8px;
    transition: width 0.5s;
  }

  .progress-label {
    font-family: 'Montserrat', sans-serif;
    font-weight: 400;
    font-size: 20px;
    color: rgba(250,246,240,0.5);
    margin-top: 12px;
    text-align: center;
  }

  .progress-label span {
    color: #C9A96E;
    font-weight: 700;
  }

  .prizes {
    margin-top: 60px;
    text-align: center;
  }

  .prize-line {
    font-family: 'Montserrat', sans-serif;
    font-weight: 500;
    font-size: 22px;
    color: rgba(250,246,240,0.7);
    margin-bottom: 8px;
  }
  .prize-line span {
    color: #C9A96E;
    font-weight: 700;
  }

  .cta {
    position: absolute;
    bottom: 120px;
    display: flex; flex-direction: column;
    align-items: center; gap: 10px;
  }

  .cta-arrow {
    font-size: 32px;
    color: #C9A96E;
    animation: bounce 1.5s infinite;
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  .cta-text {
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    font-size: 22px;
    color: #C9A96E;
    letter-spacing: 4px;
  }
</style>
</head>
<body>
  <div class="story">
    <div class="logo">SOLENNIX</div>

    <div class="content">
      <!-- CAMBIAR ESTE NÚMERO según lugares restantes -->
      <div class="big-number">7</div>
      <div class="label">Lugares Restantes</div>

      <div class="progress-container">
        <div class="progress-bar">
          <!-- Cambiar width: 65% = 13 de 20 ocupados. Fórmula: ((20 - restantes) / 20) * 100 -->
          <div class="progress-fill" style="width: 65%;"></div>
        </div>
        <div class="progress-label"><span>13</span> de 20 lugares ocupados</div>
      </div>

      <div class="prizes">
        <div class="prize-line">🥇 Primeros 10 → <span>6 meses Pro GRATIS</span></div>
        <div class="prize-line">🥈 Del 11 al 20 → <span>3 meses Pro GRATIS</span></div>
      </div>
    </div>

    <div class="cta">
      <div class="cta-arrow">↑</div>
      <div class="cta-text">LINK EN BIO</div>
    </div>
  </div>
</body>
</html>
