<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Carrusel Free vs Pro — Slide 2 (Plan Free)</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Montserrat:wght@300;400;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #333; }

  .post {
    width: 1080px; height: 1080px;
    background: #FAF6F0;
    position: relative; overflow: hidden;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 70px;
  }

  .header {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 50px;
  }

  .header-title {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 48px;
    color: #1B2A4A;
    letter-spacing: 3px;
  }

  .badge {
    background: #C9A96E;
    color: #1B2A4A;
    font-family: 'Montserrat', sans-serif;
    font-weight: 800;
    font-size: 18px;
    padding: 8px 24px;
    border-radius: 50px;
    letter-spacing: 2px;
  }

  .features {
    width: 100%;
    max-width: 700px;
  }

  .feature {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 18px 0;
    border-bottom: 1px solid rgba(27,42,74,0.08);
  }

  .feature:last-child { border-bottom: none; }

  .check {
    width: 36px;
    height: 36px;
    background: rgba(201,169,110,0.15);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    color: #C9A96E;
    font-weight: 700;
    flex-shrink: 0;
  }

  .feature-text {
    font-family: 'Montserrat', sans-serif;
    font-weight: 500;
    font-size: 26px;
    color: #1B2A4A;
  }

  .feature-text span {
    font-weight: 700;
    color: #C9A96E;
  }

  .footer-note {
    margin-top: 40px;
    font-family: 'Montserrat', sans-serif;
    font-weight: 400;
    font-size: 18px;
    color: rgba(27,42,74,0.5);
    text-align: center;
  }

  .logo-small {
    position: absolute;
    bottom: 40px;
    right: 50px;
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 16px;
    color: rgba(27,42,74,0.25);
    letter-spacing: 4px;
  }

  /* Gold accent line at top */
  .post::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(to right, transparent, #C9A96E, transparent);
  }
</style>
</head>
<body>
  <div class="post">
    <div class="header">
      <div class="header-title">PLAN GRATUITO</div>
      <div class="badge">GRATIS</div>
    </div>

    <div class="features">
      <div class="feature">
        <div class="check">✓</div>
        <div class="feature-text"><span>3</span> eventos al mes</div>
      </div>
      <div class="feature">
        <div class="check">✓</div>
        <div class="feature-text"><span>50</span> clientes registrados</div>
      </div>
      <div class="feature">
        <div class="check">✓</div>
        <div class="feature-text"><span>20</span> productos en catálogo</div>
      </div>
      <div class="feature">
        <div class="check">✓</div>
        <div class="feature-text">Cotizaciones y contratos en <span>PDF</span></div>
      </div>
      <div class="feature">
        <div class="check">✓</div>
        <div class="feature-text">Listas de compras automáticas</div>
      </div>
      <div class="feature">
        <div class="check">✓</div>
        <div class="feature-text">Calendario de eventos</div>
      </div>
      <div class="feature">
        <div class="check">✓</div>
        <div class="feature-text">Dashboard con <span>KPIs</span></div>
      </div>
      <div class="feature">
        <div class="check">✓</div>
        <div class="feature-text">App móvil <span>iOS + Android</span></div>
      </div>
    </div>

    <div class="footer-note">Sin tarjeta de crédito · Sin límite de tiempo · Para siempre</div>
    <div class="logo-small">SOLENNIX</div>
  </div>
</body>
</html>
