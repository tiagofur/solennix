<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Carrusel Free vs Pro — Slide 3 (Plan Pro)</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Montserrat:wght@300;400;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #333; }

  .post {
    width: 1080px; height: 1080px;
    background: #1B2A4A;
    position: relative; overflow: hidden;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 70px;
  }

  .post::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(ellipse at 50% 30%, rgba(201,169,110,0.1) 0%, transparent 50%);
  }

  .post::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(to right, transparent, #C9A96E, transparent);
  }

  .header {
    position: relative;
    z-index: 2;
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 50px;
  }

  .header-title {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 48px;
    color: #C9A96E;
    letter-spacing: 3px;
    text-shadow: 0 0 30px rgba(201,169,110,0.3);
  }

  .badge {
    background: #C9A96E;
    color: #1B2A4A;
    font-family: 'Montserrat', sans-serif;
    font-weight: 800;
    font-size: 16px;
    padding: 8px 20px;
    border-radius: 50px;
    letter-spacing: 1px;
  }

  .features {
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 700px;
  }

  .feature {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 18px 0;
    border-bottom: 1px solid rgba(201,169,110,0.1);
  }
  .feature:last-child { border-bottom: none; }

  .check {
    width: 36px; height: 36px;
    background: rgba(201,169,110,0.2);
    border: 1px solid rgba(201,169,110,0.4);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; color: #C9A96E; font-weight: 700;
    flex-shrink: 0;
  }

  .feature-text {
    font-family: 'Montserrat', sans-serif;
    font-weight: 500;
    font-size: 26px;
    color: #FAF6F0;
  }
  .feature-text span {
    font-weight: 700;
    color: #C9A96E;
  }

  .promo-badge {
    position: relative;
    z-index: 2;
    margin-top: 40px;
    background: rgba(201,169,110,0.12);
    border: 2px solid #C9A96E;
    border-radius: 8px;
    padding: 16px 36px;
    text-align: center;
  }

  .promo-badge-text {
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    font-size: 20px;
    color: #C9A96E;
    letter-spacing: 2px;
  }

  .logo-small {
    position: absolute;
    bottom: 40px;
    right: 50px;
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 16px;
    color: rgba(201,169,110,0.3);
    letter-spacing: 4px;
  }
</style>
</head>
<body>
  <div class="post">
    <div class="header">
      <div class="header-title">PLAN PRO</div>
      <div class="badge">$149/mes MXN</div>
    </div>

    <div class="features">
      <div class="feature">
        <div class="check">✓</div>
        <div class="feature-text">Todo lo del plan gratuito</div>
      </div>
      <div class="feature">
        <div class="check">✓</div>
        <div class="feature-text">Eventos <span>ILIMITADOS</span></div>
      </div>
      <div class="feature">
        <div class="check">✓</div>
        <div class="feature-text">Clientes <span>ILIMITADOS</span></div>
      </div>
      <div class="feature">
        <div class="check">✓</div>
        <div class="feature-text">Catálogo <span>ILIMITADO</span></div>
      </div>
      <div class="feature">
        <div class="check">✓</div>
        <div class="feature-text">Analítica <span>avanzada</span></div>
      </div>
      <div class="feature">
        <div class="check">✓</div>
        <div class="feature-text">Soporte <span>prioritario</span></div>
      </div>
    </div>

    <div class="promo-badge">
      <div class="promo-badge-text">🔥 GANA HASTA 6 MESES GRATIS</div>
    </div>

    <div class="logo-small">SOLENNIX</div>
  </div>
</body>
</html>
