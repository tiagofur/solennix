<?xml version="1.0" encoding="UTF-8"?>
<!-- Solennix — Wordmark Only (sobre fondo oscuro) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 60">
  <defs>
    <linearGradient id="wGold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C4A265"/>
      <stop offset="40%" stop-color="#D4B87A"/>
      <stop offset="60%" stop-color="#F5F0E8"/>
      <stop offset="80%" stop-color="#D4B87A"/>
      <stop offset="100%" stop-color="#C4A265"/>
    </linearGradient>
    <filter id="wGlow" x="-5%" y="-15%" width="110%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="b"/>
      <feFlood flood-color="#C4A265" flood-opacity="0.1" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <text x="190" y="40" text-anchor="middle"
        font-family="Cinzel, 'Playfair Display', Didot, 'Bodoni MT', Georgia, serif"
        font-size="48"
        font-weight="600"
        letter-spacing="4"
        fill="url(#wGold)"
        filter="url(#wGlow)">Solennix</text>
</svg>
