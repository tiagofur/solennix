name: Solennix
options:
  bundleIdPrefix: com.solennix.app
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  groupSortPosition: top

packages:
  SolennixCore:
    path: Packages/SolennixCore
  SolennixDesign:
    path: Packages/SolennixDesign
  SolennixNetwork:
    path: Packages/SolennixNetwork
  SolennixFeatures:
    path: Packages/SolennixFeatures

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "T5SKULSP2M"
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
  configs:
    Debug:
      CODE_SIGN_STYLE: Automatic
    Release:
      CODE_SIGN_STYLE: Automatic

targets:
  Solennix:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Solennix
      - path: SolennixIntents
        excludes:
          - "Info.plist"
    resources:
      - path: Solennix/PrivacyInfo.xcprivacy
      - path: Solennix/GoogleService-Info.plist
    entitlements:
      path: Solennix/Solennix.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
        com.apple.security.application-groups:
          - group.com.solennix.app
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.solennix.app
        MARKETING_VERSION: "1.1.0"
        CURRENT_PROJECT_VERSION: "6"
        SWIFT_VERSION: "5.9"
        INFOPLIST_FILE: Solennix/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: Solennix/Solennix.entitlements
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.business"
    configFiles:
      Debug: Config/Secrets.xcconfig
      Release: Config/Secrets.xcconfig
    dependencies:
      - package: SolennixCore
      - package: SolennixDesign
      - package: SolennixNetwork
      - package: SolennixFeatures
      - target: SolennixWidgetExtension
        embed: true
      - target: SolennixNotificationServiceExtension
        embed: true

  SolennixNotificationServiceExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - SolennixNotificationServiceExtension
    entitlements:
      path: SolennixNotificationServiceExtension/SolennixNotificationServiceExtension.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.solennix.app.notifications
        MARKETING_VERSION: "1.0.4"
        CURRENT_PROJECT_VERSION: "5"
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_ENTITLEMENTS: SolennixNotificationServiceExtension/SolennixNotificationServiceExtension.entitlements

  SolennixWidgetExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - SolennixWidgetExtension
      - SolennixLiveActivity
    entitlements:
      path: SolennixWidgetExtension/SolennixWidgetExtension.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.solennix.app.widgets
        MARKETING_VERSION: "1.0.4"
        CURRENT_PROJECT_VERSION: "5"
        SWIFT_VERSION: "5.9"
        INFOPLIST_FILE: SolennixWidgetExtension/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: SolennixWidgetExtension/SolennixWidgetExtension.entitlements
    dependencies:
      - package: SolennixCore
      - package: SolennixDesign
      - package: SolennixNetwork

  SolennixTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - SolennixTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.solennix.app.tests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.9"
    dependencies:
      - target: Solennix
      - package: SolennixCore

schemes:
  Solennix:
    build:
      targets:
        Solennix: all
        SolennixWidgetExtension: all
        SolennixNotificationServiceExtension: all
    run:
      config: Debug
      storeKitConfiguration: Solennix/SolennixProducts.storekit
    test:
      config: Debug
      storeKitConfiguration: Solennix/SolennixProducts.storekit
      targets:
        - SolennixTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  SolennixWidgetExtension:
    build:
      targets:
        SolennixWidgetExtension: all
    run:
      config: Debug
      askForAppToLaunch: true
