version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eventosapp-backend
    restart: always
    environment:
      - PORT=8080
      - ENVIRONMENT=production
      - DATABASE_URL=postgres://eventosapp_user:eventosapp_password@db:5432/eventosapp?sslmode=disable
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRY_HOURS=24
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - FRONTEND_URL=${FRONTEND_URL}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - STRIPE_PRO_PRICE_ID=${STRIPE_PRO_PRICE_ID}
      - STRIPE_PORTAL_CONFIG_ID=${STRIPE_PORTAL_CONFIG_ID}
      - REVENUECAT_WEBHOOK_SECRET=${REVENUECAT_WEBHOOK_SECRET}
    depends_on:
      - db
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=https://api-eventos.creapolis.dev/api
    container_name: eventosapp-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

  db:
    image: postgres:15-alpine
    container_name: eventosapp-db
    restart: always
    environment:
      POSTGRES_USER: eventosapp_user
      POSTGRES_PASSWORD: eventosapp_password
      POSTGRES_DB: eventosapp
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  db_data:
