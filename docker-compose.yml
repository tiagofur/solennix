version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eventosapp-backend
    restart: always
    env_file:
      - ./backend/.env.production
    environment:
      - DATABASE_URL=postgres://eventosapp_user:eventosapp_password@db:5432/eventosapp?sslmode=disable
    depends_on:
      - db
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=https://api-eventos.creapolis.dev/api
    container_name: eventosapp-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

  db:
    image: postgres:15-alpine
    container_name: eventosapp-db
    restart: always
    environment:
      POSTGRES_USER: eventosapp_user
      POSTGRES_PASSWORD: eventosapp_password
      POSTGRES_DB: eventosapp
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  db_data:
