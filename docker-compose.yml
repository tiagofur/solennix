version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eventosapp-backend
    restart: always
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgres://eventosapp_user:eventosapp_password@db:5432/eventosapp?sslmode=disable
      - BOOTSTRAP_ADMIN_EMAIL=tiagofur@gmail.com
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=https://api-eventos.creapolis.dev/api
    container_name: eventosapp-frontend
    restart: always
    ports:
      - "3000:80"

  db:
    image: postgres:15-alpine
    container_name: eventosapp-db
    restart: always
    environment:
      POSTGRES_USER: eventosapp_user
      POSTGRES_PASSWORD: eventosapp_password
      POSTGRES_DB: eventosapp
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventosapp_user -d eventosapp"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db_data:
