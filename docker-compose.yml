services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: solennix-backend
    restart: always
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgres://solennix_user:solennix_password@db:5432/solennix?sslmode=disable
      - BOOTSTRAP_ADMIN_EMAIL=tiagofur@gmail.com
      - CORS_ALLOWED_ORIGINS=https://solennix.com,https://www.solennix.com
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=https://api.solennix.com/api
    container_name: solennix-frontend
    restart: always
    ports:
      - "3000:80"

  db:
    image: postgres:15-alpine
    container_name: solennix-db
    restart: always
    environment:
      POSTGRES_USER: solennix_user
      POSTGRES_PASSWORD: solennix_password
      POSTGRES_DB: solennix
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U solennix_user -d solennix"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db_data:
