name: solennix

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: solennix-backend
    restart: always
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8080}:8080"
    volumes:
      - uploads_data:/root/uploads

  seed:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: solennix-seed
    profiles: ["tools"]
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    entrypoint: ["./seed"]

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-https://api.solennix.com/api}
        - VITE_SENTRY_DSN=${VITE_SENTRY_DSN:-}
    container_name: solennix-frontend
    restart: always
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-3000}:80"

  db:
    image: postgres:15-alpine
    container_name: solennix-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-solennix_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
      POSTGRES_DB: ${DB_NAME:-solennix}
    expose:
      - "5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U solennix_user -d solennix"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db_data:
    external: true
    name: solennix_db_data
  uploads_data:
    external: true
    name: solennix_uploads_data
