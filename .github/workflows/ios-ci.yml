name: iOS CI

on:
  push:
    branches: [main, develop]
    paths:
      - "ios/**"
      - ".github/workflows/ios-ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "ios/**"
      - ".github/workflows/ios-ci.yml"

concurrency:
  group: ios-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios-validation:
    name: iOS Validation
    runs-on: macos-15
    timeout-minutes: 45
    defaults:
      run:
        working-directory: ./ios

    steps:
      - uses: actions/checkout@v4

      - name: Create CI secrets config placeholder
        run: cp Config/Secrets.xcconfig.example Config/Secrets.xcconfig

      - name: Select compatible Xcode
        run: |
          XCODE_APP="$(ls -1d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -n1)"
          if [ -z "$XCODE_APP" ]; then
            echo "No Xcode installation found"
            ls -1 /Applications | grep Xcode || true
            exit 1
          fi

          sudo xcode-select -s "$XCODE_APP/Contents/Developer"
          xcodebuild -version

          XCODE_MAJOR="$(xcodebuild -version | awk '/Xcode/ { print $2 }' | cut -d. -f1)"
          if [ "${XCODE_MAJOR:-0}" -lt 16 ]; then
            echo "Xcode 16+ is required for this project format (objectVersion 77)."
            echo "Selected Xcode: $XCODE_APP"
            exit 1
          fi

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve Swift packages
        run: xcodebuild -resolvePackageDependencies -project Solennix.xcodeproj -scheme Solennix

      - name: Build for iOS Simulator (no signing)
        run: |
          SIMULATOR_ID="$(xcrun simctl list devices available | awk -F '[()]' '/iPhone 16/ { print $2; exit }')"
          if [ -z "$SIMULATOR_ID" ]; then
            SIMULATOR_ID="$(xcrun simctl list devices available | awk -F '[()]' '/iPhone/ { print $2; exit }')"
          fi
          if [ -z "$SIMULATOR_ID" ]; then
            xcrun simctl list devices available
            echo "No available iPhone simulator found"
            exit 1
          fi
          xcodebuild \
            -project Solennix.xcodeproj \
            -scheme Solennix \
            -destination "platform=iOS Simulator,id=${SIMULATOR_ID}" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=YES \
            EXCLUDED_ARCHS=x86_64 \
            SWIFT_ENABLE_EXPLICIT_MODULES=NO \
            CLANG_ENABLE_EXPLICIT_MODULES=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            -jobs 1 \
            build
