name: iOS CI

on:
  push:
    branches: [main, develop]
    paths:
      - "ios/**"
      - ".github/workflows/ios-ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "ios/**"
      - ".github/workflows/ios-ci.yml"

concurrency:
  group: ios-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios-validation:
    name: iOS Validation
    runs-on: macos-latest
    timeout-minutes: 35
    defaults:
      run:
        working-directory: ./ios

    steps:
      - uses: actions/checkout@v4

      - name: Create CI secrets config placeholder
        run: cp Config/Secrets.xcconfig.example Config/Secrets.xcconfig

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve Swift packages
        run: xcodebuild -resolvePackageDependencies -project Solennix.xcodeproj -scheme Solennix

      - name: Build for iOS Simulator (no signing)
        run: |
          xcodebuild \
            -project Solennix.xcodeproj \
            -scheme Solennix \
            -destination "generic/platform=iOS Simulator" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build
