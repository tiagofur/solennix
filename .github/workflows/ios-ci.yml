name: iOS CI

on:
  push:
    branches: [main, develop]
    paths:
      - "ios/**"
      - ".github/workflows/ios-ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "ios/**"
      - ".github/workflows/ios-ci.yml"

concurrency:
  group: ios-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios-validation:
    name: iOS Validation
    runs-on: macos-14
    timeout-minutes: 45
    defaults:
      run:
        working-directory: ./ios

    steps:
      - uses: actions/checkout@v4

      - name: Create CI secrets config placeholder
        run: cp Config/Secrets.xcconfig.example Config/Secrets.xcconfig

      - name: Select stable Xcode
        run: |
          if [ -d /Applications/Xcode_16.2.app ]; then
            sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
          elif [ -d /Applications/Xcode_15.4.app ]; then
            sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer
          else
            echo "No supported Xcode found"
            ls -1 /Applications | grep Xcode || true
            exit 1
          fi
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve Swift packages
        run: xcodebuild -resolvePackageDependencies -project Solennix.xcodeproj -scheme Solennix

      - name: Build for iOS Simulator (no signing)
        run: |
          SIMULATOR_ID="$(xcrun simctl list devices available | awk -F '[()]' '/iPhone 16/ { print $2; exit }')"
          if [ -z "$SIMULATOR_ID" ]; then
            SIMULATOR_ID="$(xcrun simctl list devices available | awk -F '[()]' '/iPhone/ { print $2; exit }')"
          fi
          if [ -z "$SIMULATOR_ID" ]; then
            xcrun simctl list devices available
            echo "No available iPhone simulator found"
            exit 1
          fi
          xcodebuild \
            -project Solennix.xcodeproj \
            -scheme Solennix \
            -destination "platform=iOS Simulator,id=${SIMULATOR_ID}" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=YES \
            EXCLUDED_ARCHS=x86_64 \
            SWIFT_ENABLE_EXPLICIT_MODULES=NO \
            CLANG_ENABLE_EXPLICIT_MODULES=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            -jobs 1 \
            build
