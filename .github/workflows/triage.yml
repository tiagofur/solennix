name: Triage

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]
  issues:
    types: [opened, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  pr-path-labels:
    name: PR path labels
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: true

  pr-size-label:
    name: PR size label
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    steps:
      - name: Assign size label
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const changed = pr.additions + pr.deletions;
            let sizeLabel = 'size:S';
            if (changed > 800) sizeLabel = 'size:L';
            else if (changed > 250) sizeLabel = 'size:M';

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = pr.number;
            const existing = (await github.rest.issues.listLabelsOnIssue({ owner, repo, issue_number })).data.map(l => l.name);
            const sizeLabels = ['size:S', 'size:M', 'size:L'];
            const toRemove = existing.filter(l => sizeLabels.includes(l) && l !== sizeLabel);

            for (const label of toRemove) {
              try {
                await github.rest.issues.removeLabel({ owner, repo, issue_number, name: label });
              } catch (error) {
                core.warning(`Could not remove label ${label}: ${error.message}`);
              }
            }

            try {
              await github.rest.issues.addLabels({ owner, repo, issue_number, labels: [sizeLabel] });
            } catch (error) {
              core.warning(`Could not add label ${sizeLabel}: ${error.message}`);
            }

  issue-default-labels:
    name: Issue default labels
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    steps:
      - name: Add status and priority defaults
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.issue.number;
            const labels = ['status:ready', 'priority:medium'];

            try {
              await github.rest.issues.addLabels({ owner, repo, issue_number, labels });
            } catch (error) {
              core.warning(`Could not add default issue labels: ${error.message}`);
            }
