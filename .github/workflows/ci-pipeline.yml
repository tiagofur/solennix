name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch: {}

# Touching this workflow forces all CI domains via paths-filter rules.

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      android: ${{ steps.filter.outputs.android }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/ci-pipeline.yml'
            frontend:
              - 'web/**'
              - '.github/workflows/ci-pipeline.yml'
            android:
              - 'android/**'
              - '.github/workflows/ci-pipeline.yml'

  backend:
    name: Backend Tests
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
          cache-dependency-path: ./backend/go.sum
      - run: go mod download
      - run: go test -v -coverprofile=coverage.out ./...

  frontend:
    name: Frontend Tests
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ./web/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npm run check
      - run: npm run lint
      - run: npm run test:run
      - run: npm run build

  android-quality:
    name: Android Quality Gate
    needs: detect-changes
    if: needs.detect-changes.outputs.android == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Unit tests (debug)
        run: ./gradlew testDebugUnitTest --no-daemon
      - name: Coverage gate (phase 4.1 + 4.4 + app/widget/designsystem)
        run: ./gradlew :core:model:jacocoDebugCoverageVerification :core:database:jacocoDebugCoverageVerification :feature:auth:jacocoDebugCoverageVerification :feature:clients:jacocoDebugCoverageVerification :feature:products:jacocoDebugCoverageVerification :feature:inventory:jacocoDebugCoverageVerification :feature:search:jacocoDebugCoverageVerification :feature:payments:jacocoDebugCoverageVerification :feature:settings:jacocoDebugCoverageVerification :feature:calendar:jacocoDebugCoverageVerification :app:jacocoDebugCoverageVerification :core:designsystem:jacocoDebugCoverageVerification :widget:jacocoDebugCoverageVerification --no-daemon
      - name: Smoke androidTest compile gate
        run: ./gradlew :feature:auth:compileDebugAndroidTestKotlin :feature:dashboard:compileDebugAndroidTestKotlin --no-daemon
      - name: Baselineprofile compile gate
        run: ./gradlew :baselineprofile:compileNonMinifiedReleaseKotlin --no-daemon

