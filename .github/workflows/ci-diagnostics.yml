name: CI Diagnostics

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-diagnostics-${{ github.ref }}
  cancel-in-progress: true

jobs:
  stage-1-checkout:
    name: Stage 1 - Checkout only
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: echo "stage-1 ok"

  stage-2-node:
    name: Stage 2 - Node setup
    runs-on: ubuntu-latest
    needs: stage-1-checkout
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
      - run: node --version

  stage-3-go:
    name: Stage 3 - Go setup
    runs-on: ubuntu-latest
    needs: stage-2-node
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
      - run: go version

  stage-4-java-gradle:
    name: Stage 4 - Java and Gradle setup
    runs-on: ubuntu-latest
    needs: stage-3-go
    defaults:
      run:
        working-directory: ./android
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v6
      - run: ./gradlew --version

  stage-5-backend-smoke:
    name: Stage 5 - Backend smoke
    runs-on: ubuntu-latest
    needs: stage-4-java-gradle
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
          cache-dependency-path: ./backend/go.sum
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
      - name: Validate OpenAPI spec
        working-directory: .
        run: npx --yes @redocly/cli@latest lint backend/docs/openapi.yaml
      - run: go mod download
      - run: go test -v ./...

  stage-6-frontend-smoke:
    name: Stage 6 - Frontend smoke
    runs-on: ubuntu-latest
    needs: stage-5-backend-smoke
    defaults:
      run:
        working-directory: ./web
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ./web/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npm run check
      - run: npm run lint
