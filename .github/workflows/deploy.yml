# ─────────────────────────────────────────────────────────────────────────
# Production deploy workflow
#
# Se dispara al hacer push (o merge de PR) a `main`. Flujo:
#   1. Espera a que el CI Pipeline termine exitosamente
#   2. Se conecta por SSH al VPS con el usuario deploy
#   3. Hace fetch + reset a origin/main
#   4. Levanta/actualiza containers con docker compose
#
# Estrategia de branching: GitHub Flow.
#   - `main` = producción. Feature branches → PR → merge → deploy automático.
#   - Hotfix: branch desde main, PR, merge.
#
# Secretos requeridos (Settings → Secrets and variables → Actions):
#   - VPS_HOST       host o IP del servidor (ej. 74.208.234.244)
#   - VPS_USERNAME   usuario SSH (deploy)
#   - VPS_SSH_KEY    clave privada OpenSSH (con BEGIN/END intactos)
#   - VPS_PORT       puerto SSH (22)
#   - VPS_APP_PATH   ruta absoluta al repo en el VPS (/home/deploy/solennix)
# ─────────────────────────────────────────────────────────────────────────

name: Deploy to production

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Execute deployment script on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -euo pipefail
            cd "${{ secrets.VPS_APP_PATH }}"
            echo "→ Fetching latest from origin/main"
            git fetch origin main
            git checkout main
            git reset --hard origin/main
            echo "→ Cleaning up orphan containers from previous compose versions"
            docker rm -f solennix-frontend solennix-backend solennix-db 2>/dev/null || true
            echo "→ Rebuilding containers"
            if docker compose version >/dev/null 2>&1; then
              docker compose pull || true
              docker compose up -d --build --remove-orphans
              docker compose ps
            else
              docker-compose pull || true
              docker-compose up -d --build --remove-orphans
              docker-compose ps
            fi
            echo "→ Cleaning dangling images"
            docker image prune -f || true
            echo "✓ Deploy OK"
