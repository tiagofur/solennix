platform:ios:
  - changed-files:
      - any-glob-to-any-file:
          - "ios/**"

platform:android:
  - changed-files:
      - any-glob-to-any-file:
          - "android/**"

platform:web:
  - changed-files:
      - any-glob-to-any-file:
          - "web/**"
          - "remotion/**"

platform:backend:
  - changed-files:
      - any-glob-to-any-file:
          - "backend/**"

platform:cross-platform:
  - changed-files:
      - any-glob-to-any-file:
          - "docs/PRD/**"
          - "openspec/**"

type:infra:
  - changed-files:
      - any-glob-to-any-file:
          - ".github/**"
          - "infra/**"
          - "docker-compose.yml"
