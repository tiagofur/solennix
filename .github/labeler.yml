platform:ios:
  - changed-files:
      - any-glob-to-any-file:
          - "ios/**"

platform:android:
  - changed-files:
      - any-glob-to-any-file:
          - "android/**"

platform:web:
  - changed-files:
      - any-glob-to-any-file:
          - "web/**"
          - "remotion/**"

platform:backend:
  - changed-files:
      - any-glob-to-any-file:
          - "backend/**"

platform:cross-platform:
  - changed-files:
      - any-glob-to-any-file:
          - "docs/PRD/**"
          - "openspec/**"

type:docs:
  - changed-files:
      - any-glob-to-any-file:
          - "docs/**"
          - "README.md"
          - "AGENTS.md"
          - "CLAUDE.md"

type:infra:
  - changed-files:
      - any-glob-to-any-file:
          - ".github/**"
          - "infra/**"
          - "docker-compose.yml"

type:test:
  - changed-files:
      - any-glob-to-any-file:
          - "testsprite_tests/**"
          - "**/*test*"
