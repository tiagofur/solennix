version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/web"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels:
      - "type:chore"
      - "dependencies"
      - "platform:web"
    groups:
      web-non-major:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "npm"
    directory: "/remotion"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    labels:
      - "type:chore"
      - "dependencies"
    groups:
      remotion-non-major:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "gomod"
    directory: "/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels:
      - "type:chore"
      - "dependencies"
      - "platform:backend"
    groups:
      backend-go-non-major:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "gradle"
    directory: "/android"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels:
      - "type:chore"
      - "dependencies"
      - "platform:android"
    groups:
      android-gradle-non-major:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    labels:
      - "type:chore"
      - "dependencies"
      - "platform:cross-platform"
    groups:
      actions-non-major:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
