name: Refactor
description: Technical debt or structural improvement
labels: ["type:refactor", "status:ready", "priority:medium"]
body:
  - type: markdown
    attributes:
      value: |
        Issues start with `status:ready`.
        Move them to `status:approved` once the target architecture and migration plan are approved.

  - type: textarea
    id: current
    attributes:
      label: Current limitation
      description: What is hard to maintain today?
    validations:
      required: true

  - type: textarea
    id: target
    attributes:
      label: Target architecture or outcome
    validations:
      required: true

  - type: textarea
    id: risks
    attributes:
      label: Risks and migration plan
      description: Include rollback strategy.
    validations:
      required: true
