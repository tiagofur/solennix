name: Bug report
description: Report something broken in Solennix
labels: ["bug", "type:bug", "status:ready", "priority:medium"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is failing?
      placeholder: A clear description of the bug.
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - iOS
        - Android
        - Web
        - Backend
        - Cross-platform
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to...
        2. Click...
        3. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Include stack traces, screenshots, or videos if possible.
