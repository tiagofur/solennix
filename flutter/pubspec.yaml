name: eventosapp
description: App móvil de gestión de eventos.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # HTTP & API
  dio: ^5.4.0
  json_annotation: ^4.8.1
  freezed_annotation: ^2.4.1

  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0

  # UI Components
  fl_chart: ^0.66.0
  syncfusion_flutter_pdf: ^24.1.41
  intl: ^0.20.2
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9

  # Forms & Validation
  # flutter_form_builder: ^9.0.0
  # form_builder_validators: ^9.0.0

  # Utilities
  image_picker: ^1.0.5
  share_plus: ^7.2.1
  path_provider: ^2.1.2
  url_launcher: ^6.2.2
  flutter_slidable: ^3.0.1
  pull_to_refresh: ^2.0.0
  infinite_scroll_pagination: ^4.0.0
  table_calendar: ^3.0.9

  # Notifications
  flutter_local_notifications: ^16.3.0

  # Location & Maps
  geolocator: ^10.1.0
  geocoding: ^2.1.1

  # Routing
  go_router: ^13.0.0

  # Internationalization
  easy_localization: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  riverpod_lint: ^2.3.7
  json_serializable: ^6.7.1
  hive_generator: ^2.0.1
  freezed: ^2.4.6
  mockito: ^5.4.4

scripts:
  # Ejecutar todos los tests
  test: flutter test --coverage

  # Solo unit tests
  test:unit: flutter test test/unit/ --coverage

  # Solo widget tests
  test:widget: flutter test test/widgets/ --coverage

  # Solo integration tests
  test:integration: flutter test test/integration/ --coverage

  # Tests específicos con patrón
  test:auth: flutter test test/**/*auth* test.dart --coverage
  test:events: flutter test test/**/*event* test.dart --coverage

  # Tests en watch mode (desarrollo)
  test:watch: flutter test --watch

  # Coverage con reporte
  coverage: flutter test --coverage && lcov --summary lcov.info

flutter:
  uses-material-design: true
